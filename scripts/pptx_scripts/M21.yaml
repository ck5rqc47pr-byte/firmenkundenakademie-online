      - "Feld 3: Kapitalstruktur — Wie stabil ist die Basis?"
      - "Feld 4: Managementqualität — Wem vertrauen wir?"
      - "Feld 5: Branchenpositionierung — Wie ist die Marktlage?"
      - "Feld 6: Sicherheiten — Was ist verwertbar?"
      - "Feld 7: Konditionen — Risikogerecht bepreist?"
      - "Feld 8: Exit-Szenarien — Was passiert im Worst Case?"
