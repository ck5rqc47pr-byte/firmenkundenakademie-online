  - type: headline
    title: "Operative Netzwerkpflege vs. strategischer Beziehungsaufbau"
    left: "Operative Pflege: Bestehende Kontakte halten, Geburtstage notieren, IHK-Abend besuchen. Strategisch: Gezielt in Beziehungen investieren, die langfristig Vertrauen und Empfehlungen erzeugen."
    right: "Faustregel: 20 % der Netzwerkkontakte erzeugen 80 % der Empfehlungen. Wer sind Ihre 20 %?"
