      - "Kooperationen: Steuerberater, Anwälte, Unternehmensberater als Partner"
    section: "III · Sichtbarkeit aufbauen — authentisch"

  - type: content
    title: "90-Tage-Netzwerkplan: Konkret werden"
    bullets:
      - "Monat 1: Netzwerkanalyse + fünf Stärkungsgespräche"
      - "Monat 2: Zwei neue Kooperationspartner ansprechen"
      - "Monat 3: Einen LinkedIn-Beitrag veröffentlichen oder Vortrag halten"
      - "Messbar: Wie viele qualifizierte Empfehlungen im Quartal?"
    section: "III · Sichtbarkeit aufbauen — authentisch"

