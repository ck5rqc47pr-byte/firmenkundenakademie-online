    subtitle: "Stärken, Brücken und Lücken sehen"

  - type: content
    title: "Netzwerkanalyse in drei Schritten"
    bullets:
      - "Bestandsaufnahme: Wer ist in meinem Netzwerk? (Kunden, Partner, Multiplikatoren)"
      - "Stärke bewerten: Wer empfiehlt mich aktiv? Wer kennt mich nur flüchtig?"
      - "Lücken identifizieren: Welche Branchen, Berufsgruppen fehlen?"
      - "Brücken finden: Wer kann mich zu jemandem einführen, den ich brauche?"
    section: "II · Das eigene Netzwerk analysieren"

