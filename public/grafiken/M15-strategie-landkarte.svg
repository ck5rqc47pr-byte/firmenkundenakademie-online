<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 560" width="860" height="560">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      text { font-family: Georgia, serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Source Serif 4', Georgia, serif; }
    </style>
  </defs>

  <rect width="860" height="560" fill="#F8F8FA"/>

  <text x="40" y="30" class="mono" font-size="10" fill="#7A8099" letter-spacing="2">STRATEGIE-LANDKARTE · MODUL 15 · MARKTBEARBEITUNGSSTRATEGIE</text>
  <line x1="40" y1="40" x2="820" y2="40" stroke="#E2E3E8" stroke-width="1"/>

  <text x="40" y="68" class="mono" font-size="9" fill="#7A8099" letter-spacing="1">VIER STRATEGISCHE LEITFRAGEN</text>

  <!-- 4 question cards -->
  <rect x="40" y="84" width="183" height="170" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="40" y="84" width="183" height="4" fill="#1F2C56"/>
  <text x="56" y="134" class="serif" font-size="24" fill="#1F2C56" font-weight="500">Wen?</text>
  <text x="56" y="158" class="mono" font-size="8" fill="#7A8099">ZIELKUNDEN</text>
  <line x1="56" y1="172" x2="207" y2="172" stroke="#F1F1F4" stroke-width="1"/>
  <text x="56" y="200" class="serif" font-size="12" fill="#3D4460">Welche Branchen,</text>
  <text x="56" y="218" class="serif" font-size="12" fill="#3D4460">Größen, Regionen?</text>

  <rect x="239" y="84" width="183" height="170" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="239" y="84" width="183" height="4" fill="#3D5494"/>
  <text x="255" y="134" class="serif" font-size="24" fill="#1F2C56" font-weight="500">Womit?</text>
  <text x="255" y="158" class="mono" font-size="8" fill="#7A8099">LEISTUNGSANGEBOT</text>
  <line x1="255" y1="172" x2="406" y2="172" stroke="#F1F1F4" stroke-width="1"/>
  <text x="255" y="200" class="serif" font-size="12" fill="#3D4460">Welche Produkte</text>
  <text x="255" y="218" class="serif" font-size="12" fill="#3D4460">&amp; Lösungen?</text>

  <rect x="438" y="84" width="183" height="170" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="438" y="84" width="183" height="4" fill="#D9C089"/>
  <text x="454" y="134" class="serif" font-size="24" fill="#1F2C56" font-weight="500">Wie?</text>
  <text x="454" y="158" class="mono" font-size="8" fill="#7A8099">DIFFERENZIERUNG</text>
  <line x1="454" y1="172" x2="605" y2="172" stroke="#F1F1F4" stroke-width="1"/>
  <text x="454" y="200" class="serif" font-size="12" fill="#3D4460">Worüber gewinnen</text>
  <text x="454" y="218" class="serif" font-size="12" fill="#3D4460">wir den Kunden?</text>

  <rect x="637" y="84" width="183" height="170" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="637" y="84" width="183" height="4" fill="#1F2C56"/>
  <text x="653" y="134" class="serif" font-size="24" fill="#1F2C56" font-weight="500">Wann?</text>
  <text x="653" y="158" class="mono" font-size="8" fill="#7A8099">ANLASS &amp; TIMING</text>
  <line x1="653" y1="172" x2="804" y2="172" stroke="#F1F1F4" stroke-width="1"/>
  <text x="653" y="200" class="serif" font-size="12" fill="#3D4460">Zu welchen Triggern</text>
  <text x="653" y="218" class="serif" font-size="12" fill="#3D4460">ansprechen?</text>

  <!-- Porter strategies -->
  <text x="40" y="300" class="mono" font-size="9" fill="#7A8099" letter-spacing="1">PORTER · DREI GENERISCHE WETTBEWERBSSTRATEGIEN</text>

  <rect x="40" y="316" width="249" height="136" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="40" y="316" width="6" height="136" fill="#1F2C56"/>
  <text x="64" y="346" class="mono" font-size="8" fill="#B0B3C0">STRATEGIE 1</text>
  <text x="64" y="372" class="serif" font-size="16" fill="#1F2C56" font-weight="500">Kostenführerschaft</text>
  <text x="64" y="404" class="serif" font-size="12" fill="#3D4460">Der günstigste Anbieter</text>
  <text x="64" y="422" class="serif" font-size="12" fill="#3D4460">im relevanten Markt.</text>

  <rect x="305" y="316" width="249" height="136" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="305" y="316" width="6" height="136" fill="#3D5494"/>
  <text x="329" y="346" class="mono" font-size="8" fill="#B0B3C0">STRATEGIE 2</text>
  <text x="329" y="372" class="serif" font-size="16" fill="#1F2C56" font-weight="500">Differenzierung</text>
  <text x="329" y="404" class="serif" font-size="12" fill="#3D4460">Einzigartiger Nutzen,</text>
  <text x="329" y="422" class="serif" font-size="12" fill="#3D4460">Premium-Positionierung.</text>

  <rect x="570" y="316" width="249" height="136" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="570" y="316" width="6" height="136" fill="#D9C089"/>
  <text x="594" y="346" class="mono" font-size="8" fill="#B0B3C0">STRATEGIE 3</text>
  <text x="594" y="372" class="serif" font-size="16" fill="#1F2C56" font-weight="500">Fokus / Nische</text>
  <text x="594" y="404" class="serif" font-size="12" fill="#3D4460">Spezialisierung auf ein</text>
  <text x="594" y="422" class="serif" font-size="12" fill="#3D4460">eng umrissenes Segment.</text>

  <!-- KPI banner -->
  <rect x="40" y="478" width="779" height="48" fill="#1F2C56"/>
  <text x="64" y="512" class="serif" font-size="28" fill="#D9C089" font-weight="500">18 %</text>
  <text x="140" y="500" class="serif" font-size="13" fill="#F8F8FA">der Banken verfügen über eine</text>
  <text x="140" y="518" class="serif" font-size="13" fill="#F8F8FA">dokumentierte Marktbearbeitungsstrategie (zeb 2020).</text>

  <text x="40" y="548" class="mono" font-size="9" fill="#B0B3C0" letter-spacing="0.5">Porter (1980/1985) zu generischen Wettbewerbsstrategien · zeb (2020) · strukturierte Marktbearbeitung</text>
</svg>
