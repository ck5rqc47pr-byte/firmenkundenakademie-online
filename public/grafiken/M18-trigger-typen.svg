<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 560" width="860" height="560">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      text { font-family: Georgia, serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Source Serif 4', Georgia, serif; }
    </style>
  </defs>

  <rect width="860" height="560" fill="#F8F8FA"/>

  <text x="40" y="30" class="mono" font-size="10" fill="#7A8099" letter-spacing="2">DATENBASIERTE ANSPRACHE · MODUL 18 · DATENGETRIEBENER VERTRIEB</text>
  <line x1="40" y1="40" x2="820" y2="40" stroke="#E2E3E8" stroke-width="1"/>

  <text x="40" y="68" class="mono" font-size="9" fill="#7A8099" letter-spacing="1">DREI TRIGGER-TYPEN FÜR ANLASSBEZOGENE ANSPRACHE</text>

  <!-- Typ 1 -->
  <rect x="40" y="84" width="249" height="194" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="40" y="84" width="249" height="4" fill="#1F2C56"/>
  <text x="64" y="116" class="mono" font-size="8" fill="#B0B3C0">TYP 1</text>
  <text x="64" y="142" class="serif" font-size="16" fill="#1F2C56" font-weight="500">Transaktional</text>
  <line x1="64" y1="158" x2="265" y2="158" stroke="#F1F1F4" stroke-width="1"/>
  <text x="64" y="184" class="serif" font-size="12" fill="#3D4460">Zahlungssprünge,</text>
  <text x="64" y="202" class="serif" font-size="12" fill="#3D4460">Umsatzplus, neue</text>
  <text x="64" y="220" class="serif" font-size="12" fill="#3D4460">Lieferantenbeziehungen.</text>
  <rect x="64" y="238" width="170" height="22" fill="#EDEDF3"/>
  <text x="74" y="253" class="mono" font-size="8" fill="#3D4460">SOFORT · KURZFRISTIG</text>

  <!-- Typ 2 -->
  <rect x="305" y="84" width="249" height="194" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="305" y="84" width="249" height="4" fill="#3D5494"/>
  <text x="329" y="116" class="mono" font-size="8" fill="#B0B3C0">TYP 2</text>
  <text x="329" y="142" class="serif" font-size="16" fill="#1F2C56" font-weight="500">Ratingbasiert</text>
  <line x1="329" y1="158" x2="530" y2="158" stroke="#F1F1F4" stroke-width="1"/>
  <text x="329" y="184" class="serif" font-size="12" fill="#3D4460">Ratingänderung,</text>
  <text x="329" y="202" class="serif" font-size="12" fill="#3D4460">Kennzahlen-Trend,</text>
  <text x="329" y="220" class="serif" font-size="12" fill="#3D4460">Limitausschöpfung.</text>
  <rect x="329" y="238" width="170" height="22" fill="#EDEDF3"/>
  <text x="339" y="253" class="mono" font-size="8" fill="#3D4460">SOFORT · KURZFRISTIG</text>

  <!-- Typ 3 -->
  <rect x="570" y="84" width="249" height="194" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="570" y="84" width="249" height="4" fill="#D9C089"/>
  <text x="594" y="116" class="mono" font-size="8" fill="#B0B3C0">TYP 3</text>
  <text x="594" y="142" class="serif" font-size="16" fill="#1F2C56" font-weight="500">Lebensereignisbasiert</text>
  <line x1="594" y1="158" x2="795" y2="158" stroke="#F1F1F4" stroke-width="1"/>
  <text x="594" y="184" class="serif" font-size="12" fill="#3D4460">Nachfolge, Expansion,</text>
  <text x="594" y="202" class="serif" font-size="12" fill="#3D4460">Investition,</text>
  <text x="594" y="220" class="serif" font-size="12" fill="#3D4460">Generationswechsel.</text>
  <rect x="594" y="238" width="170" height="22" fill="#EDEDF3"/>
  <text x="604" y="253" class="mono" font-size="8" fill="#3D4460">MITTEL- · LANGFRISTIG</text>

  <!-- principles -->
  <text x="40" y="322" class="mono" font-size="9" fill="#7A8099" letter-spacing="1">DREI GRUNDPRINZIPIEN</text>

  <rect x="40" y="338" width="249" height="118" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="40" y="338" width="6" height="118" fill="#1F2C56"/>
  <text x="64" y="368" class="mono" font-size="8" fill="#B0B3C0">PRINZIP 1</text>
  <text x="64" y="396" class="serif" font-size="15" fill="#1F2C56" font-weight="500">Timing vor Häufigkeit</text>
  <text x="64" y="422" class="serif" font-size="11" fill="#3D4460">Der richtige Moment zählt</text>
  <text x="64" y="438" class="serif" font-size="11" fill="#3D4460">mehr als die Frequenz.</text>

  <rect x="305" y="338" width="249" height="118" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="305" y="338" width="6" height="118" fill="#3D5494"/>
  <text x="329" y="368" class="mono" font-size="8" fill="#B0B3C0">PRINZIP 2</text>
  <text x="329" y="396" class="serif" font-size="15" fill="#1F2C56" font-weight="500">Relevanz vor Breite</text>
  <text x="329" y="422" class="serif" font-size="11" fill="#3D4460">Passgenaue Ansprache statt</text>
  <text x="329" y="438" class="serif" font-size="11" fill="#3D4460">Gießkannenprinzip.</text>

  <rect x="570" y="338" width="249" height="118" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="570" y="338" width="6" height="118" fill="#D9C089"/>
  <text x="594" y="368" class="mono" font-size="8" fill="#B0B3C0">PRINZIP 3</text>
  <text x="594" y="396" class="serif" font-size="15" fill="#1F2C56" font-weight="500">Daten + Beziehung</text>
  <text x="594" y="422" class="serif" font-size="11" fill="#3D4460">Daten ersetzen keine</text>
  <text x="594" y="438" class="serif" font-size="11" fill="#3D4460">persönliche Beziehung.</text>

  <!-- KPI -->
  <rect x="40" y="478" width="779" height="48" fill="#1F2C56"/>
  <text x="64" y="512" class="serif" font-size="28" fill="#D9C089" font-weight="500">2–5×</text>
  <text x="150" y="500" class="serif" font-size="13" fill="#F8F8FA">höhere Konversionsrate bei anlassbezogener,</text>
  <text x="150" y="518" class="serif" font-size="13" fill="#F8F8FA">datengestützter Kundenansprache.</text>

  <text x="40" y="548" class="mono" font-size="9" fill="#B0B3C0" letter-spacing="0.5">Kumar &amp; Reinartz (2018) · zeb (2022) · DSGVO-konforme datengetriebene Kundenansprache</text>
</svg>
