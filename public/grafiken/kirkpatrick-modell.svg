<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 540" width="860" height="540">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      text { font-family: Georgia, serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Source Serif 4', Georgia, serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="860" height="540" fill="#F8F8FA"/>

  <!-- Eyebrow -->
  <text x="40" y="30" class="mono" font-size="10" fill="#7A8099" letter-spacing="2">EVALUATIONSMODELL · KIRKPATRICK (1994) · LEVEL 1–4</text>
  <line x1="40" y1="40" x2="820" y2="40" stroke="#E2E3E8" stroke-width="1"/>

  <!-- ══════════════════════════════════════════════
       4 aufsteigende Säulen (je 180px breit, 20px Abstand)
       Baseline y=480, Säulenhöhen: 150 / 220 / 320 / 420
       ══════════════════════════════════════════════ -->

  <!-- ── Level 1: Reaktion — bg-2 #EDEDF3 ── -->
  <rect x="40" y="330" width="180" height="150" fill="#EDEDF3"/>
  <rect x="40" y="330" width="180" height="150" fill="none" stroke="#15192B" stroke-width="1"/>
  <!-- Roman numeral -->
  <text x="60" y="390" class="serif" font-size="54" font-style="italic" fill="#1F2C56">I.</text>
  <!-- Level name -->
  <text x="60" y="416" class="serif" font-size="16" fill="#15192B" font-weight="500">Reaktion</text>
  <!-- Subtitle -->
  <text x="60" y="433" class="mono" font-size="9" fill="#7A8099" letter-spacing="1">REACTION · LEVEL 1</text>
  <!-- Separator -->
  <line x1="60" y1="445" x2="200" y2="445" stroke="#15192B" stroke-width="0.5" opacity="0.2"/>
  <!-- Method -->
  <text x="60" y="459" class="mono" font-size="9" fill="#7A8099" letter-spacing="0.5">Feedbackbogen</text>

  <!-- Connector arrow 1 → 2 -->
  <polygon points="222,476 238,480 222,484" fill="#C8CAD4"/>

  <!-- ── Level 2: Lernen — accent #D9C089 ── -->
  <rect x="240" y="260" width="180" height="220" fill="#D9C089"/>
  <rect x="240" y="260" width="180" height="220" fill="none" stroke="#15192B" stroke-width="1"/>
  <text x="260" y="320" class="serif" font-size="54" font-style="italic" fill="#15192B">II.</text>
  <text x="260" y="346" class="serif" font-size="16" fill="#15192B" font-weight="500">Lernen</text>
  <text x="260" y="363" class="mono" font-size="9" fill="#3D4460" letter-spacing="1">LEARNING · LEVEL 2</text>
  <line x1="260" y1="375" x2="400" y2="375" stroke="#15192B" stroke-width="0.5" opacity="0.2"/>
  <text x="260" y="389" class="mono" font-size="9" fill="#3D4460" letter-spacing="0.5">Wissenstest · Quiz</text>

  <!-- Connector arrow 2 → 3 -->
  <polygon points="422,476 438,480 422,484" fill="#C8CAD4"/>

  <!-- ── Level 3: Verhalten — mid-primary #3D5494 ── -->
  <rect x="440" y="160" width="180" height="320" fill="#3D5494"/>
  <rect x="440" y="160" width="180" height="320" fill="none" stroke="#15192B" stroke-width="1"/>
  <text x="460" y="220" class="serif" font-size="54" font-style="italic" fill="#F8F8FA">III.</text>
  <text x="460" y="246" class="serif" font-size="16" fill="#F8F8FA" font-weight="500">Verhalten</text>
  <text x="460" y="263" class="mono" font-size="9" fill="#8898C4" letter-spacing="1">BEHAVIOUR · LEVEL 3</text>
  <line x1="460" y1="275" x2="600" y2="275" stroke="#F8F8FA" stroke-width="0.5" opacity="0.25"/>
  <text x="460" y="289" class="mono" font-size="9" fill="#8898C4" letter-spacing="0.5">Beobachtung · 360°-Feedback</text>
  <!-- Additional context -->
  <text x="460" y="308" class="mono" font-size="9" fill="#8898C4" letter-spacing="0.5">4-Wochen-Transfercheck</text>

  <!-- Connector arrow 3 → 4 -->
  <polygon points="622,476 638,480 622,484" fill="#C8CAD4"/>

  <!-- ── Level 4: Ergebnis — primary #1F2C56 ── -->
  <rect x="640" y="60" width="180" height="420" fill="#1F2C56"/>
  <rect x="640" y="60" width="180" height="420" fill="none" stroke="#1F2C56" stroke-width="1"/>
  <text x="660" y="120" class="serif" font-size="54" font-style="italic" fill="#D9C089">IV.</text>
  <text x="660" y="146" class="serif" font-size="16" fill="#F8F8FA" font-weight="500">Ergebnis</text>
  <text x="660" y="163" class="mono" font-size="9" fill="#8898C4" letter-spacing="1">RESULTS · LEVEL 4</text>
  <line x1="660" y1="175" x2="800" y2="175" stroke="#F8F8FA" stroke-width="0.5" opacity="0.25"/>
  <text x="660" y="189" class="mono" font-size="9" fill="#8898C4" letter-spacing="0.5">KPIs · Geschäftszahlen</text>
  <text x="660" y="208" class="mono" font-size="9" fill="#8898C4" letter-spacing="0.5">Kreditvolumen · NPS</text>

  <!-- ── Baseline ── -->
  <line x1="40" y1="480" x2="820" y2="480" stroke="#15192B" stroke-width="1"/>

  <!-- Direction labels below baseline -->
  <text x="40" y="497" class="mono" font-size="9" fill="#7A8099" letter-spacing="1">EINFACHER ZU MESSEN</text>
  <text x="820" y="497" class="mono" font-size="9" fill="#7A8099" text-anchor="end" letter-spacing="1">HÖHERE WIRKUNGSTIEFE</text>
  <!-- Arrow -->
  <line x1="220" y1="493" x2="580" y2="493" stroke="#E2E3E8" stroke-width="1"/>
  <polygon points="580,489 590,493 580,497" fill="#E2E3E8"/>

  <!-- Source -->
  <text x="40" y="525" class="mono" font-size="9" fill="#B0B3C0" letter-spacing="0.5">Kirkpatrick, D. L. (1994). Evaluating training programs: The four levels. Berrett-Koehler Publishers.</text>
</svg>
