<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 540" width="860" height="540">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      text { font-family: Georgia, serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Source Serif 4', Georgia, serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="860" height="540" fill="#F8F8FA"/>

  <!-- Eyebrow -->
  <text x="40" y="30" class="mono" font-size="10" fill="#7A8099" letter-spacing="2">BLOOM-TAXONOMIE · ANDERSON &amp; KRATHWOHL (2001) · REVIDIERTE FASSUNG</text>
  <line x1="40" y1="40" x2="820" y2="40" stroke="#E2E3E8" stroke-width="1"/>

  <!-- Pyramid layers (bottom to top, trapezoids via polygon) -->
  <!-- Each layer: full width at bottom tapers toward top -->
  <!-- Total pyramid height: 400px (y=60 to y=460), width at base: 780px, at top: 0 -->
  <!-- 6 equal layers, each 66px tall -->
  <!-- Width per layer (bottom=780, step=-130 per level) -->
  <!-- Layer widths: 780, 650, 520, 390, 260, 130 -->
  <!-- x offsets (centered at x=430): base offset = 430 - width/2 -->

  <!-- Layer 1: Erinnern (bottom) — bg-2 #EDEDF3 -->
  <polygon points="40,460 820,460 755,394 105,394" fill="#EDEDF3"/>
  <polygon points="40,460 820,460 755,394 105,394" fill="none" stroke="#15192B" stroke-width="1"/>

  <!-- Layer 2: Verstehen — mix bg-2/accent -->
  <polygon points="105,394 755,394 690,328 170,328" fill="#EAD9A8"/>
  <polygon points="105,394 755,394 690,328 170,328" fill="none" stroke="#15192B" stroke-width="1"/>

  <!-- Layer 3: Anwenden — accent #D9C089 -->
  <polygon points="170,328 690,328 625,262 235,262" fill="#D9C089"/>
  <polygon points="170,328 690,328 625,262 235,262" fill="none" stroke="#15192B" stroke-width="1"/>

  <!-- Layer 4: Analysieren — primary light mix -->
  <polygon points="235,262 625,262 560,196 300,196" fill="#8898C4"/>
  <polygon points="235,262 625,262 560,196 300,196" fill="none" stroke="#15192B" stroke-width="1"/>

  <!-- Layer 5: Evaluieren — primary mid -->
  <polygon points="300,196 560,196 495,130 365,130" fill="#3D5494"/>
  <polygon points="300,196 560,196 495,130 365,130" fill="none" stroke="#15192B" stroke-width="1"/>

  <!-- Layer 6: Erschaffen (top) — primary #1F2C56 -->
  <polygon points="365,130 495,130 430,64 430,64" fill="#1F2C56"/>
  <polygon points="365,130 495,130 430,64 430,64" fill="none" stroke="#15192B" stroke-width="1"/>

  <!-- ── Layer labels (centered vertically in each layer) ── -->

  <!-- Layer 1: Erinnern — y center = 427 -->
  <text x="80" y="422" class="mono" font-size="9" fill="#7A8099" letter-spacing="1">I</text>
  <text x="200" y="434" class="serif" font-size="18" fill="#1F2C56" font-weight="500">Erinnern</text>
  <text x="200" y="452" class="mono" font-size="9" fill="#7A8099" letter-spacing="1">REMEMBER · BLOOM-STUFE 1</text>
  <text x="680" y="434" class="mono" font-size="9" fill="#7A8099" text-anchor="end">Wiedergeben · Benennen · Aufzählen</text>

  <!-- Layer 2: Verstehen — y center = 361 -->
  <text x="145" y="356" class="mono" font-size="9" fill="#7A8099" letter-spacing="1">II</text>
  <text x="230" y="368" class="serif" font-size="18" fill="#15192B" font-weight="500">Verstehen</text>
  <text x="230" y="386" class="mono" font-size="9" fill="#3D4460" letter-spacing="1">UNDERSTAND · BLOOM-STUFE 2</text>
  <text x="680" y="368" class="mono" font-size="9" fill="#3D4460" text-anchor="end">Erklären · Zusammenfassen · Einordnen</text>

  <!-- Layer 3: Anwenden — y center = 295 -->
  <text x="210" y="290" class="mono" font-size="9" fill="#3D4460" letter-spacing="1">III</text>
  <text x="270" y="302" class="serif" font-size="18" fill="#15192B" font-weight="500">Anwenden</text>
  <text x="270" y="320" class="mono" font-size="9" fill="#3D4460" letter-spacing="1">APPLY · BLOOM-STUFE 3</text>
  <text x="650" y="302" class="mono" font-size="9" fill="#3D4460" text-anchor="end">Ausführen · Berechnen · Umsetzen</text>

  <!-- Layer 4: Analysieren — y center = 229 -->
  <text x="275" y="224" class="mono" font-size="9" fill="#F8F8FA" letter-spacing="1">IV</text>
  <text x="320" y="236" class="serif" font-size="18" fill="#F8F8FA" font-weight="500">Analysieren</text>
  <text x="320" y="254" class="mono" font-size="9" fill="rgba(248,248,250,0.7)" letter-spacing="1">ANALYSE · BLOOM-STUFE 4</text>
  <text x="600" y="236" class="mono" font-size="9" fill="rgba(248,248,250,0.7)" text-anchor="end">Differenzieren · Strukturieren · Prüfen</text>

  <!-- Layer 5: Evaluieren — y center = 163 -->
  <text x="340" y="158" class="mono" font-size="9" fill="rgba(248,248,250,0.7)" letter-spacing="1">V</text>
  <text x="368" y="170" class="serif" font-size="18" fill="#F8F8FA" font-weight="500">Evaluieren</text>
  <text x="368" y="188" class="mono" font-size="9" fill="rgba(248,248,250,0.6)" letter-spacing="1">EVALUATE · BLOOM-STUFE 5</text>

  <!-- Layer 6: Erschaffen — y center = 97 -->
  <!-- Too narrow for full text, just numeral + name centered -->
  <text x="430" y="100" class="mono" font-size="8" fill="var(--accent)" fill="rgba(217,192,137,0.9)" text-anchor="middle" letter-spacing="1">VI</text>
  <text x="430" y="113" class="serif" font-size="13" fill="#D9C089" text-anchor="middle" font-weight="500">Erschaffen</text>

  <!-- ── Baseline ── -->
  <line x1="40" y1="475" x2="820" y2="475" stroke="#15192B" stroke-width="1"/>

  <!-- Direction labels below baseline -->
  <text x="40" y="492" class="mono" font-size="9" fill="#7A8099" letter-spacing="1">GRUNDLAGEN</text>
  <text x="820" y="492" class="mono" font-size="9" fill="#7A8099" text-anchor="end" letter-spacing="1">HÖHERE KOGNITION</text>
  <!-- Arrow line -->
  <line x1="130" y1="488" x2="680" y2="488" stroke="#E2E3E8" stroke-width="1"/>
  <polygon points="680,484 690,488 680,492" fill="#E2E3E8"/>

  <!-- Source -->
  <text x="40" y="525" class="mono" font-size="9" fill="#B0B3C0" letter-spacing="0.5">Anderson, L. W. &amp; Krathwohl, D. R. (Eds.) (2001). A taxonomy for learning, teaching, and assessing. Longman. — Revidierte Bloom-Taxonomie.</text>
</svg>
