<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" width="860" height="520">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      text { font-family: Georgia, serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Source Serif 4', Georgia, serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="860" height="520" fill="#F8F8FA"/>

  <!-- Eyebrow -->
  <text x="40" y="30" class="mono" font-size="10" fill="#7A8099" letter-spacing="2">BLOOM-TAXONOMIE · ANDERSON &amp; KRATHWOHL (2001) · REVIDIERTE FASSUNG</text>
  <line x1="40" y1="40" x2="820" y2="40" stroke="#E2E3E8" stroke-width="1"/>

  <!-- Vertical depth arrow on left -->
  <line x1="26" y1="455" x2="26" y2="72" stroke="#E2E3E8" stroke-width="1"/>
  <polygon points="22,72 26,62 30,72" fill="#E2E3E8"/>
  <text x="26" y="262" class="mono" font-size="8" fill="#B0B3C0" text-anchor="middle" letter-spacing="2" transform="rotate(-90,26,262)">KOGNITIVE TIEFE</text>

  <!-- ══════════════════════════════════════════════
       PYRAMID  (center x=220, base y=460, top y=64)
       6 layers × 66px, widths: 340→290→240→190→140→90→40
       ══════════════════════════════════════════════ -->

  <!-- Layer 1: Erinnern — bg-2 #EDEDF3 -->
  <polygon points="50,460 390,460 365,394 75,394" fill="#EDEDF3"/>
  <polygon points="50,460 390,460 365,394 75,394" fill="none" stroke="#15192B" stroke-width="1"/>
  <!-- Roman numeral, left inside -->
  <text x="65" y="433" class="mono" font-size="9" fill="#7A8099" letter-spacing="1">I</text>
  <!-- Connector to label area -->
  <line x1="378" y1="427" x2="420" y2="427" stroke="#C8CAD4" stroke-width="1"/>

  <!-- Layer 2: Verstehen — mix bg-2/accent -->
  <polygon points="75,394 365,394 340,328 100,328" fill="#EAD9A8"/>
  <polygon points="75,394 365,394 340,328 100,328" fill="none" stroke="#15192B" stroke-width="1"/>
  <text x="90" y="366" class="mono" font-size="9" fill="#7A8099" letter-spacing="1">II</text>
  <line x1="353" y1="361" x2="420" y2="361" stroke="#C8CAD4" stroke-width="1"/>

  <!-- Layer 3: Anwenden — accent #D9C089 -->
  <polygon points="100,328 340,328 315,262 125,262" fill="#D9C089"/>
  <polygon points="100,328 340,328 315,262 125,262" fill="none" stroke="#15192B" stroke-width="1"/>
  <text x="115" y="299" class="mono" font-size="9" fill="#3D4460" letter-spacing="1">III</text>
  <line x1="328" y1="295" x2="420" y2="295" stroke="#C8CAD4" stroke-width="1"/>

  <!-- Layer 4: Analysieren — primary light #8898C4 -->
  <polygon points="125,262 315,262 290,196 150,196" fill="#8898C4"/>
  <polygon points="125,262 315,262 290,196 150,196" fill="none" stroke="#15192B" stroke-width="1"/>
  <text x="140" y="233" class="mono" font-size="9" fill="rgba(248,248,250,0.75)" letter-spacing="1">IV</text>
  <line x1="303" y1="229" x2="420" y2="229" stroke="#C8CAD4" stroke-width="1"/>

  <!-- Layer 5: Evaluieren — primary mid #3D5494 -->
  <polygon points="150,196 290,196 265,130 175,130" fill="#3D5494"/>
  <polygon points="150,196 290,196 265,130 175,130" fill="none" stroke="#15192B" stroke-width="1"/>
  <text x="165" y="167" class="mono" font-size="9" fill="rgba(248,248,250,0.75)" letter-spacing="1">V</text>
  <line x1="278" y1="163" x2="420" y2="163" stroke="#C8CAD4" stroke-width="1"/>

  <!-- Layer 6: Erschaffen — primary #1F2C56 -->
  <polygon points="175,130 265,130 240,64 200,64" fill="#1F2C56"/>
  <polygon points="175,130 265,130 240,64 200,64" fill="none" stroke="#15192B" stroke-width="1"/>
  <text x="188" y="101" class="mono" font-size="9" fill="#D9C089" letter-spacing="1">VI</text>
  <line x1="253" y1="97" x2="420" y2="97" stroke="#C8CAD4" stroke-width="1"/>

  <!-- ══════════════════════════════════════════════
       LABELS  (right panel, x=428 onwards)
       Each: level name (serif 18) + subtitle (mono 8) + verbs (mono 8)
       ══════════════════════════════════════════════ -->

  <!-- L1: Erinnern, y_center=427 -->
  <text x="428" y="421" class="serif" font-size="18" fill="#1F2C56" font-weight="500">Erinnern</text>
  <text x="428" y="436" class="mono" font-size="8" fill="#7A8099" letter-spacing="1">REMEMBER · BLOOM-STUFE 1</text>
  <text x="428" y="450" class="mono" font-size="8" fill="#9A9DB0" letter-spacing="0.5">Wiedergeben · Benennen · Aufzählen</text>

  <!-- L2: Verstehen, y_center=361 -->
  <text x="428" y="355" class="serif" font-size="18" fill="#1F2C56" font-weight="500">Verstehen</text>
  <text x="428" y="370" class="mono" font-size="8" fill="#7A8099" letter-spacing="1">UNDERSTAND · BLOOM-STUFE 2</text>
  <text x="428" y="384" class="mono" font-size="8" fill="#9A9DB0" letter-spacing="0.5">Erklären · Einordnen · Zusammenfassen</text>

  <!-- L3: Anwenden, y_center=295 -->
  <text x="428" y="289" class="serif" font-size="18" fill="#1F2C56" font-weight="500">Anwenden</text>
  <text x="428" y="304" class="mono" font-size="8" fill="#7A8099" letter-spacing="1">APPLY · BLOOM-STUFE 3</text>
  <text x="428" y="318" class="mono" font-size="8" fill="#9A9DB0" letter-spacing="0.5">Ausführen · Berechnen · Umsetzen</text>

  <!-- L4: Analysieren, y_center=229 -->
  <text x="428" y="223" class="serif" font-size="18" fill="#1F2C56" font-weight="500">Analysieren</text>
  <text x="428" y="238" class="mono" font-size="8" fill="#7A8099" letter-spacing="1">ANALYSE · BLOOM-STUFE 4</text>
  <text x="428" y="252" class="mono" font-size="8" fill="#9A9DB0" letter-spacing="0.5">Differenzieren · Strukturieren · Prüfen</text>

  <!-- L5: Evaluieren, y_center=163 -->
  <text x="428" y="157" class="serif" font-size="18" fill="#1F2C56" font-weight="500">Evaluieren</text>
  <text x="428" y="172" class="mono" font-size="8" fill="#7A8099" letter-spacing="1">EVALUATE · BLOOM-STUFE 5</text>
  <text x="428" y="186" class="mono" font-size="8" fill="#9A9DB0" letter-spacing="0.5">Beurteilen · Rechtfertigen · Kritisieren</text>

  <!-- L6: Erschaffen, y_center=97 -->
  <text x="428" y="91" class="serif" font-size="18" fill="#1F2C56" font-weight="500">Erschaffen</text>
  <text x="428" y="106" class="mono" font-size="8" fill="#7A8099" letter-spacing="1">CREATE · BLOOM-STUFE 6</text>
  <text x="428" y="120" class="mono" font-size="8" fill="#9A9DB0" letter-spacing="0.5">Entwerfen · Entwickeln · Konstruieren</text>

  <!-- ── Baseline ── -->
  <line x1="40" y1="472" x2="820" y2="472" stroke="#15192B" stroke-width="1"/>

  <!-- Direction labels -->
  <text x="40" y="489" class="mono" font-size="9" fill="#7A8099" letter-spacing="1">GRUNDLAGEN</text>
  <text x="400" y="489" class="mono" font-size="9" fill="#7A8099" text-anchor="end" letter-spacing="1">HÖHERE KOGNITION</text>
  <!-- Arrow between labels -->
  <line x1="155" y1="485" x2="330" y2="485" stroke="#E2E3E8" stroke-width="1"/>
  <polygon points="330,481 340,485 330,489" fill="#E2E3E8"/>

  <!-- Source -->
  <text x="40" y="510" class="mono" font-size="9" fill="#B0B3C0" letter-spacing="0.5">Anderson, L. W. &amp; Krathwohl, D. R. (Eds.) (2001). A taxonomy for learning, teaching, and assessing. Longman.</text>
</svg>
