<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 510" width="860" height="510">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      text { font-family: Georgia, serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Source Serif 4', Georgia, serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="860" height="510" fill="#F8F8FA"/>

  <!-- Eyebrow -->
  <text x="40" y="30" class="mono" font-size="10" fill="#7A8099" letter-spacing="2">BILANZSTRUKTUR · § 266 HGB · MODUL 01 · BILANZLESEN FÜR PRAKTIKER</text>
  <line x1="40" y1="40" x2="820" y2="40" stroke="#E2E3E8" stroke-width="1"/>

  <!-- ══════════════════════════════════════════════
       LEFT PANEL: AKTIVA x=40–405
       ══════════════════════════════════════════════ -->

  <!-- AKTIVA Header bar -->
  <rect x="40" y="55" width="365" height="25" fill="#1F2C56"/>
  <text x="55" y="72" class="mono" font-size="9" fill="#F8F8FA" letter-spacing="2">AKTIVA · MITTELVERWENDUNG</text>

  <!-- AV block: y=80–230, height=150 -->
  <rect x="40" y="80" width="365" height="150" fill="#3D5494"/>
  <rect x="40" y="80" width="365" height="150" fill="none" stroke="#15192B" stroke-width="1"/>
  <text x="55" y="104" class="mono" font-size="9" fill="#F8F8FA" letter-spacing="2">ANLAGEVERMÖGEN</text>
  <text x="55" y="122" class="mono" font-size="9" fill="rgba(248,248,250,0.75)" letter-spacing="0.5">· Sachanlagen</text>
  <text x="55" y="138" class="mono" font-size="9" fill="rgba(248,248,250,0.75)" letter-spacing="0.5">· Immaterielles Anlagevermögen</text>
  <text x="55" y="154" class="mono" font-size="9" fill="rgba(248,248,250,0.75)" letter-spacing="0.5">· Finanzanlagen</text>
  <text x="390" y="162" class="mono" font-size="9" fill="#D9C089" text-anchor="end" letter-spacing="0.5">ca. 40–50 %</text>

  <!-- UV block: y=230–430, height=200 -->
  <rect x="40" y="230" width="365" height="200" fill="#EDEDF3"/>
  <rect x="40" y="230" width="365" height="200" fill="none" stroke="#15192B" stroke-width="1"/>
  <text x="55" y="254" class="mono" font-size="9" fill="#7A8099" letter-spacing="2">UMLAUFVERMÖGEN</text>
  <text x="55" y="272" class="mono" font-size="9" fill="#3D4460" letter-spacing="0.5">· Vorräte</text>
  <text x="55" y="288" class="mono" font-size="9" fill="#3D4460" letter-spacing="0.5">· Forderungen aus L+L</text>
  <text x="55" y="304" class="mono" font-size="9" fill="#3D4460" letter-spacing="0.5">· Kassenbestand · Bank</text>
  <text x="390" y="332" class="mono" font-size="9" fill="#7A8099" text-anchor="end" letter-spacing="0.5">ca. 50–60 %</text>

  <!-- ══════════════════════════════════════════════
       CENTER GAP x=405–455
       ══════════════════════════════════════════════ -->
  <text x="430" y="262" class="mono" font-size="14" fill="#7A8099" text-anchor="middle">=</text>

  <!-- ══════════════════════════════════════════════
       RIGHT PANEL: PASSIVA x=455–820
       ══════════════════════════════════════════════ -->

  <!-- PASSIVA Header bar -->
  <rect x="455" y="55" width="365" height="25" fill="#1F2C56"/>
  <text x="470" y="72" class="mono" font-size="9" fill="#F8F8FA" letter-spacing="2">PASSIVA · MITTELHERKUNFT</text>

  <!-- EK block: y=80–197, height=117 -->
  <rect x="455" y="80" width="365" height="117" fill="#D9C089"/>
  <rect x="455" y="80" width="365" height="117" fill="none" stroke="#15192B" stroke-width="1"/>
  <text x="470" y="104" class="mono" font-size="9" fill="#15192B" letter-spacing="2">EIGENKAPITAL</text>
  <text x="470" y="122" class="mono" font-size="9" fill="#3D4460" letter-spacing="0.5">· Gezeichnetes Kapital</text>
  <text x="470" y="138" class="mono" font-size="9" fill="#3D4460" letter-spacing="0.5">· Rücklagen</text>
  <text x="470" y="154" class="mono" font-size="9" fill="#3D4460" letter-spacing="0.5">· Jahresüberschuss/-fehlbetrag</text>
  <text x="805" y="140" class="mono" font-size="9" fill="#1F2C56" text-anchor="end" letter-spacing="0.5">∅ KMU 31 %</text>

  <!-- FK langfristig: y=197–330, height=133 -->
  <rect x="455" y="197" width="365" height="133" fill="#3D5494"/>
  <rect x="455" y="197" width="365" height="133" fill="none" stroke="#15192B" stroke-width="1"/>
  <text x="470" y="218" class="mono" font-size="9" fill="#F8F8FA" letter-spacing="1">FREMDKAPITAL LANGFRISTIG &gt; 1 JAHR</text>
  <text x="470" y="236" class="mono" font-size="9" fill="rgba(248,248,250,0.75)" letter-spacing="0.5">· Langfristige Bankdarlehen</text>
  <text x="470" y="252" class="mono" font-size="9" fill="rgba(248,248,250,0.75)" letter-spacing="0.5">· Rückstellungen</text>

  <!-- FK kurzfristig: y=330–430, height=100 -->
  <rect x="455" y="330" width="365" height="100" fill="#EDEDF3"/>
  <rect x="455" y="330" width="365" height="100" fill="none" stroke="#15192B" stroke-width="1"/>
  <text x="470" y="351" class="mono" font-size="9" fill="#7A8099" letter-spacing="1">FREMDKAPITAL KURZFRISTIG ≤ 1 JAHR</text>
  <text x="470" y="369" class="mono" font-size="9" fill="#3D4460" letter-spacing="0.5">· Verbindlichkeiten aus L+L</text>
  <text x="470" y="385" class="mono" font-size="9" fill="#3D4460" letter-spacing="0.5">· Kontokorrentkredit</text>

  <!-- ── Baseline y=430 ── -->
  <line x1="40" y1="430" x2="820" y2="430" stroke="#15192B" stroke-width="1"/>

  <!-- ── Goldene Bilanzregel box y=440–480 ── -->
  <rect x="40" y="440" width="780" height="35" fill="#EDEDF3"/>
  <rect x="40" y="440" width="780" height="35" fill="none" stroke="#E2E3E8" stroke-width="1"/>
  <text x="55" y="453" class="mono" font-size="9" fill="#1F2C56" letter-spacing="1" font-weight="500">GOLDENE BILANZREGEL — Fristenkongruenz:</text>
  <text x="55" y="467" class="mono" font-size="9" fill="#7A8099" letter-spacing="0.5">Anlagevermögen (40–50 %) ≤ Eigenkapital + Fremdkapital langfristig (≈ 65–70 %) · Bei Verletzung: Warnsignal im Kreditgespräch</text>

  <!-- Source -->
  <text x="40" y="500" class="mono" font-size="9" fill="#B0B3C0" letter-spacing="0.5">§ 266 HGB · Coenenberg, Haller &amp; Schultze (2021). Jahresabschluss und Jahresabschlussanalyse (26. Aufl.). Schäffer-Poeschel.</text>
</svg>
