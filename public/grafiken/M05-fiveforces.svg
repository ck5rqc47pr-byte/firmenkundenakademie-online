<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 600" width="860" height="600">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      text { font-family: Georgia, serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Source Serif 4', Georgia, serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="860" height="600" fill="#F8F8FA"/>

  <!-- Eyebrow -->
  <text x="40" y="30" class="mono" font-size="10" fill="#7A8099" letter-spacing="2">FIVE-FORCES-MODELL · MODUL 05 · BRANCHENSPEZIFISCHE RISIKOSYSTEME</text>
  <line x1="40" y1="40" x2="820" y2="40" stroke="#E2E3E8" stroke-width="1"/>

  <!-- ═══ TOP: Neue Konkurrenten ═══ -->
  <rect x="300" y="70" width="260" height="92" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="300" y="70" width="260" height="4" fill="#3D5494"/>
  <text x="430" y="100" class="serif" font-size="14" fill="#1F2C56" font-weight="500" text-anchor="middle">Neue Konkurrenten</text>
  <text x="430" y="120" class="mono" font-size="8" fill="#7A8099" text-anchor="middle">Eintrittsbarrieren, Kapital-</text>
  <text x="430" y="133" class="mono" font-size="8" fill="#7A8099" text-anchor="middle">bedarf, Marken, Regulierung</text>
  <text x="430" y="151" class="mono" font-size="8" fill="#B0B3C0" text-anchor="middle" letter-spacing="1">BEDROHUNG VON OBEN</text>

  <!-- ═══ LEFT: Lieferanten ═══ -->
  <rect x="40" y="262" width="220" height="116" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="40" y="262" width="4" height="116" fill="#3D5494"/>
  <text x="150" y="292" class="serif" font-size="14" fill="#1F2C56" font-weight="500" text-anchor="middle">Lieferanten</text>
  <text x="150" y="312" class="mono" font-size="8" fill="#7A8099" text-anchor="middle">Verhandlungsmacht,</text>
  <text x="150" y="325" class="mono" font-size="8" fill="#7A8099" text-anchor="middle">Abhängigkeit, Wechsel-</text>
  <text x="150" y="338" class="mono" font-size="8" fill="#7A8099" text-anchor="middle">kosten, Konzentration</text>
  <text x="150" y="362" class="mono" font-size="8" fill="#B0B3C0" text-anchor="middle" letter-spacing="1">DRUCK VON LINKS</text>

  <!-- ═══ RIGHT: Abnehmer ═══ -->
  <rect x="600" y="262" width="220" height="116" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="816" y="262" width="4" height="116" fill="#3D5494"/>
  <text x="710" y="292" class="serif" font-size="14" fill="#1F2C56" font-weight="500" text-anchor="middle">Abnehmer</text>
  <text x="710" y="312" class="mono" font-size="8" fill="#7A8099" text-anchor="middle">Preissensibilität,</text>
  <text x="710" y="325" class="mono" font-size="8" fill="#7A8099" text-anchor="middle">Volumen, Transparenz,</text>
  <text x="710" y="338" class="mono" font-size="8" fill="#7A8099" text-anchor="middle">Wechselbereitschaft</text>
  <text x="710" y="362" class="mono" font-size="8" fill="#B0B3C0" text-anchor="middle" letter-spacing="1">DRUCK VON RECHTS</text>

  <!-- ═══ BOTTOM: Substitute ═══ -->
  <rect x="300" y="478" width="260" height="92" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="300" y="566" width="260" height="4" fill="#3D5494"/>
  <text x="430" y="505" class="serif" font-size="14" fill="#1F2C56" font-weight="500" text-anchor="middle">Substitute</text>
  <text x="430" y="525" class="mono" font-size="8" fill="#7A8099" text-anchor="middle">Ersatzprodukte, Preis-</text>
  <text x="430" y="538" class="mono" font-size="8" fill="#7A8099" text-anchor="middle">Leistung, Substitutions-Neigung</text>
  <text x="430" y="556" class="mono" font-size="8" fill="#B0B3C0" text-anchor="middle" letter-spacing="1">BEDROHUNG VON UNTEN</text>

  <!-- ═══ CENTER: Rivalität ═══ -->
  <rect x="320" y="240" width="220" height="160" fill="#1F2C56"/>
  <text x="430" y="290" class="serif" font-size="20" font-style="italic" fill="#D9C089" text-anchor="middle">Rivalität</text>
  <text x="430" y="314" class="serif" font-size="13" fill="#F8F8FA" text-anchor="middle">im bestehenden</text>
  <text x="430" y="332" class="serif" font-size="13" fill="#F8F8FA" text-anchor="middle">Wettbewerb</text>
  <line x1="360" y1="346" x2="500" y2="346" stroke="#F8F8FA" stroke-width="0.5" opacity="0.25"/>
  <text x="430" y="365" class="mono" font-size="8" fill="#8898C4" text-anchor="middle">Marktwachstum,</text>
  <text x="430" y="378" class="mono" font-size="8" fill="#8898C4" text-anchor="middle">Fixkosten, Differenzierung</text>

  <!-- Arrows pointing to center -->
  <!-- top → center (down) -->
  <line x1="430" y1="162" x2="430" y2="226" stroke="#C8CAD4" stroke-width="1.5"/>
  <polygon points="430,240 423,226 437,226" fill="#C8CAD4"/>
  <!-- bottom → center (up) -->
  <line x1="430" y1="478" x2="430" y2="414" stroke="#C8CAD4" stroke-width="1.5"/>
  <polygon points="430,400 423,414 437,414" fill="#C8CAD4"/>
  <!-- left → center (right) -->
  <line x1="260" y1="320" x2="306" y2="320" stroke="#C8CAD4" stroke-width="1.5"/>
  <polygon points="320,320 306,313 306,327" fill="#C8CAD4"/>
  <!-- right → center (left) -->
  <line x1="600" y1="320" x2="554" y2="320" stroke="#C8CAD4" stroke-width="1.5"/>
  <polygon points="540,320 554,313 554,327" fill="#C8CAD4"/>

  <!-- Source -->
  <text x="40" y="592" class="mono" font-size="9" fill="#B0B3C0" letter-spacing="0.5">Porter (1980) · branchenspezifische Wettbewerbsanalyse als Kreditrisiko-Frühindikator</text>
</svg>
