<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 560" width="860" height="560">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      text { font-family: Georgia, serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Source Serif 4', Georgia, serif; }
    </style>
  </defs>

  <rect width="860" height="560" fill="#F8F8FA"/>

  <text x="40" y="30" class="mono" font-size="10" fill="#7A8099" letter-spacing="2">HANDLUNGSEMPFEHLUNG · MODUL 23 · FINANCIAL MODELLING</text>
  <line x1="40" y1="40" x2="820" y2="40" stroke="#E2E3E8" stroke-width="1"/>

  <text x="40" y="66" class="mono" font-size="9" fill="#7A8099" letter-spacing="1">VOM PLANUNGSBEFUND ZUR FINANZIERUNGSEMPFEHLUNG · WENN-DANN-LOGIK</text>

  <text x="76" y="96" class="mono" font-size="9" fill="#B0B3C0" letter-spacing="1">WENN · BEFUND IM PLANUNGSMODELL</text>
  <text x="460" y="96" class="mono" font-size="9" fill="#B0B3C0" letter-spacing="1">DANN · FINANZIERUNGSREAKTION</text>

  <!-- Row 1 -->
  <rect x="40" y="106" width="780" height="92" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="40" y="106" width="6" height="92" fill="#ef4444"/>
  <text x="70" y="136" class="mono" font-size="8" fill="#ef4444">WENN</text>
  <text x="70" y="158" class="serif" font-size="14" fill="#1F2C56">Eigenkapitalquote &lt; 10 % bei</text>
  <text x="70" y="178" class="serif" font-size="14" fill="#1F2C56">geplantem Investitionssprung</text>
  <polygon points="424,148 424,164 442,156" fill="#D9C089"/>
  <line x1="430" y1="122" x2="430" y2="182" stroke="#F1F1F4" stroke-width="1"/>
  <text x="460" y="136" class="mono" font-size="8" fill="#9A7B2E">DANN</text>
  <text x="460" y="160" class="serif" font-size="13" fill="#3D4460">Eigenkapital-/Nachrangkapital stärken,</text>
  <text x="460" y="180" class="serif" font-size="13" fill="#3D4460">bevor neues Fremdkapital zugesagt wird.</text>

  <!-- Row 2 -->
  <rect x="40" y="206" width="780" height="92" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="40" y="206" width="6" height="92" fill="#ef4444"/>
  <text x="70" y="236" class="mono" font-size="8" fill="#ef4444">WENN</text>
  <text x="70" y="262" class="serif" font-size="14" fill="#1F2C56">DSCR im Base Case &lt; 1,20</text>
  <polygon points="424,248 424,264 442,256" fill="#D9C089"/>
  <line x1="430" y1="222" x2="430" y2="282" stroke="#F1F1F4" stroke-width="1"/>
  <text x="460" y="236" class="mono" font-size="8" fill="#9A7B2E">DANN</text>
  <text x="460" y="260" class="serif" font-size="13" fill="#3D4460">Tilgungsstreckung oder Laufzeitverlängerung</text>
  <text x="460" y="280" class="serif" font-size="13" fill="#3D4460">prüfen – Kapitaldienst an Cashflow anpassen.</text>

  <!-- Row 3 -->
  <rect x="40" y="306" width="780" height="92" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="40" y="306" width="6" height="92" fill="#f59e0b"/>
  <text x="70" y="336" class="mono" font-size="8" fill="#f59e0b">WENN</text>
  <text x="70" y="358" class="serif" font-size="14" fill="#1F2C56">Liquiditätsplanung zeigt negative</text>
  <text x="70" y="378" class="serif" font-size="14" fill="#1F2C56">Cashreserve</text>
  <polygon points="424,348 424,364 442,356" fill="#D9C089"/>
  <line x1="430" y1="322" x2="430" y2="382" stroke="#F1F1F4" stroke-width="1"/>
  <text x="460" y="336" class="mono" font-size="8" fill="#9A7B2E">DANN</text>
  <text x="460" y="360" class="serif" font-size="13" fill="#3D4460">Betriebsmittellinie dimensionieren und</text>
  <text x="460" y="380" class="serif" font-size="13" fill="#3D4460">im Modell als kurzfristige Linie abbilden.</text>

  <!-- Row 4 -->
  <rect x="40" y="406" width="780" height="92" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="40" y="406" width="6" height="92" fill="#f59e0b"/>
  <text x="70" y="436" class="mono" font-size="8" fill="#f59e0b">WENN</text>
  <text x="70" y="458" class="serif" font-size="14" fill="#1F2C56">Downside-Szenario bricht den</text>
  <text x="70" y="478" class="serif" font-size="14" fill="#1F2C56">DSCR-Covenant</text>
  <polygon points="424,448 424,464 442,456" fill="#D9C089"/>
  <line x1="430" y1="422" x2="430" y2="482" stroke="#F1F1F4" stroke-width="1"/>
  <text x="460" y="436" class="mono" font-size="8" fill="#9A7B2E">DANN</text>
  <text x="460" y="460" class="serif" font-size="13" fill="#3D4460">Covenant mit Heilungsrecht vereinbaren,</text>
  <text x="460" y="480" class="serif" font-size="13" fill="#3D4460">Soll-Ist-Abgleich quartalsweise aufsetzen.</text>

  <text x="40" y="538" class="mono" font-size="9" fill="#B0B3C0" letter-spacing="0.5">Handlungsempfehlung · Diagnose zu Aktion · rote Ampel als Finanzierungs- und Covenant-Impuls</text>
</svg>
