<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 540" width="860" height="540">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      text { font-family: Georgia, serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Source Serif 4', Georgia, serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="860" height="540" fill="#F8F8FA"/>

  <!-- Eyebrow -->
  <text x="40" y="30" class="mono" font-size="10" fill="#7A8099" letter-spacing="2">8-FELDER-FRAMEWORK · MODUL 21 · KREDITENTSCHEIDUNG TREFFEN</text>
  <line x1="40" y1="40" x2="820" y2="40" stroke="#E2E3E8" stroke-width="1"/>

  <!-- ══════════════════════════════════════════════
       GRID: 4 cols × 2 rows   x=40,240,440,640  w=180
       Row y: 60, 300   Height: 210
       ══════════════════════════════════════════════ -->

  <!-- ─── FELD 1: Zweck & Verwendung ─── -->
  <rect x="40" y="60" width="180" height="210" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="40" y="60" width="180" height="4" fill="#1F2C56"/>
  <text x="55" y="100" class="serif" font-size="34" font-style="italic" fill="#D9C089">1</text>
  <text x="55" y="128" class="serif" font-size="14" fill="#1F2C56" font-weight="500">Zweck &amp;</text>
  <text x="55" y="145" class="serif" font-size="14" fill="#1F2C56" font-weight="500">Verwendung</text>
  <line x1="55" y1="156" x2="205" y2="156" stroke="#E2E3E8" stroke-width="1"/>
  <text x="55" y="172" class="mono" font-size="8" fill="#7A8099">Wofür wird der Kredit</text>
  <text x="55" y="186" class="mono" font-size="8" fill="#7A8099">genutzt? Ist der Zweck</text>
  <text x="55" y="200" class="mono" font-size="8" fill="#7A8099">transparent?</text>

  <!-- ─── FELD 2: Rückzahlungsquelle ─── -->
  <rect x="240" y="60" width="180" height="210" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="240" y="60" width="180" height="4" fill="#1F2C56"/>
  <text x="255" y="100" class="serif" font-size="34" font-style="italic" fill="#D9C089">2</text>
  <text x="255" y="128" class="serif" font-size="14" fill="#1F2C56" font-weight="500">Rückzahlungs-</text>
  <text x="255" y="145" class="serif" font-size="14" fill="#1F2C56" font-weight="500">quelle</text>
  <line x1="255" y1="156" x2="405" y2="156" stroke="#E2E3E8" stroke-width="1"/>
  <text x="255" y="172" class="mono" font-size="8" fill="#7A8099">Deckt der Cashflow Zins</text>
  <text x="255" y="186" class="mono" font-size="8" fill="#7A8099">und Tilgung dauerhaft</text>
  <text x="255" y="200" class="mono" font-size="8" fill="#7A8099">ab?</text>

  <!-- ─── FELD 3: Kapitalstruktur ─── -->
  <rect x="440" y="60" width="180" height="210" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="440" y="60" width="180" height="4" fill="#1F2C56"/>
  <text x="455" y="100" class="serif" font-size="34" font-style="italic" fill="#D9C089">3</text>
  <text x="455" y="128" class="serif" font-size="14" fill="#1F2C56" font-weight="500">Kapital-</text>
  <text x="455" y="145" class="serif" font-size="14" fill="#1F2C56" font-weight="500">struktur</text>
  <line x1="455" y1="156" x2="605" y2="156" stroke="#E2E3E8" stroke-width="1"/>
  <text x="455" y="172" class="mono" font-size="8" fill="#7A8099">Wie ist finanziert? Ist</text>
  <text x="455" y="186" class="mono" font-size="8" fill="#7A8099">die Verschuldung</text>
  <text x="455" y="200" class="mono" font-size="8" fill="#7A8099">tragbar?</text>

  <!-- ─── FELD 4: Managementqualität ─── -->
  <rect x="640" y="60" width="180" height="210" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="640" y="60" width="180" height="4" fill="#1F2C56"/>
  <text x="655" y="100" class="serif" font-size="34" font-style="italic" fill="#D9C089">4</text>
  <text x="655" y="128" class="serif" font-size="14" fill="#1F2C56" font-weight="500">Management-</text>
  <text x="655" y="145" class="serif" font-size="14" fill="#1F2C56" font-weight="500">qualität</text>
  <line x1="655" y1="156" x2="805" y2="156" stroke="#E2E3E8" stroke-width="1"/>
  <text x="655" y="172" class="mono" font-size="8" fill="#7A8099">Ist die Führung</text>
  <text x="655" y="186" class="mono" font-size="8" fill="#7A8099">kompetent, erfahren,</text>
  <text x="655" y="200" class="mono" font-size="8" fill="#7A8099">langfristig gebunden?</text>

  <!-- ─── FELD 5: Branchenpositionierung ─── -->
  <rect x="40" y="300" width="180" height="210" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="40" y="300" width="180" height="4" fill="#D9C089"/>
  <text x="55" y="340" class="serif" font-size="34" font-style="italic" fill="#1F2C56">5</text>
  <text x="55" y="368" class="serif" font-size="14" fill="#1F2C56" font-weight="500">Branchen-</text>
  <text x="55" y="385" class="serif" font-size="14" fill="#1F2C56" font-weight="500">positionierung</text>
  <line x1="55" y1="396" x2="205" y2="396" stroke="#E2E3E8" stroke-width="1"/>
  <text x="55" y="412" class="mono" font-size="8" fill="#7A8099">Marktposition? Ist die</text>
  <text x="55" y="426" class="mono" font-size="8" fill="#7A8099">Branche stabil?</text>

  <!-- ─── FELD 6: Sicherheiten ─── -->
  <rect x="240" y="300" width="180" height="210" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="240" y="300" width="180" height="4" fill="#D9C089"/>
  <text x="255" y="340" class="serif" font-size="34" font-style="italic" fill="#1F2C56">6</text>
  <text x="255" y="368" class="serif" font-size="14" fill="#1F2C56" font-weight="500">Sicherheiten</text>
  <line x1="255" y1="396" x2="405" y2="396" stroke="#E2E3E8" stroke-width="1"/>
  <text x="255" y="412" class="mono" font-size="8" fill="#7A8099">Welche Sicherheiten?</text>
  <text x="255" y="426" class="mono" font-size="8" fill="#7A8099">Wie verwertbar im</text>
  <text x="255" y="440" class="mono" font-size="8" fill="#7A8099">Ernstfall?</text>

  <!-- ─── FELD 7: Konditionen & Covenants ─── -->
  <rect x="440" y="300" width="180" height="210" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="440" y="300" width="180" height="4" fill="#D9C089"/>
  <text x="455" y="340" class="serif" font-size="34" font-style="italic" fill="#1F2C56">7</text>
  <text x="455" y="368" class="serif" font-size="14" fill="#1F2C56" font-weight="500">Konditionen &amp;</text>
  <text x="455" y="385" class="serif" font-size="14" fill="#1F2C56" font-weight="500">Covenants</text>
  <line x1="455" y1="396" x2="605" y2="396" stroke="#E2E3E8" stroke-width="1"/>
  <text x="455" y="412" class="mono" font-size="8" fill="#7A8099">Zins, Laufzeit, Vertrag</text>
  <text x="455" y="426" class="mono" font-size="8" fill="#7A8099">angemessen zum</text>
  <text x="455" y="440" class="mono" font-size="8" fill="#7A8099">Risiko?</text>

  <!-- ─── FELD 8: Exit-Szenarien ─── -->
  <rect x="640" y="300" width="180" height="210" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="640" y="300" width="180" height="4" fill="#D9C089"/>
  <text x="655" y="340" class="serif" font-size="34" font-style="italic" fill="#1F2C56">8</text>
  <text x="655" y="368" class="serif" font-size="14" fill="#1F2C56" font-weight="500">Exit-</text>
  <text x="655" y="385" class="serif" font-size="14" fill="#1F2C56" font-weight="500">Szenarien</text>
  <line x1="655" y1="396" x2="805" y2="396" stroke="#E2E3E8" stroke-width="1"/>
  <text x="655" y="412" class="mono" font-size="8" fill="#7A8099">Was, wenn die primäre</text>
  <text x="655" y="426" class="mono" font-size="8" fill="#7A8099">Rückzahlungsquelle</text>
  <text x="655" y="440" class="mono" font-size="8" fill="#7A8099">wegfällt?</text>

  <!-- Section labels -->
  <text x="40" y="290" class="mono" font-size="8" fill="#B0B3C0" letter-spacing="1">QUANTITATIV &amp; STRUKTURELL (1–4)</text>
  <text x="820" y="290" class="mono" font-size="8" fill="#B0B3C0" letter-spacing="1" text-anchor="end">QUALITATIV &amp; ABSICHERUNG (5–8)</text>
  <text x="820" y="290" class="mono" font-size="8" fill="#B0B3C0" letter-spacing="1" text-anchor="end"></text>

  <!-- Source -->
  <text x="40" y="534" class="mono" font-size="9" fill="#B0B3C0" letter-spacing="0.5">MaRisk BTO 1.1 · Kahneman (2011) zu kognitiven Verzerrungen · strukturierte Kreditanalyse</text>
</svg>
