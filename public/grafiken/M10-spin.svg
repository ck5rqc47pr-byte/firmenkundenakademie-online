<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 600" width="860" height="600">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      text { font-family: Georgia, serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Source Serif 4', Georgia, serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="860" height="600" fill="#F8F8FA"/>

  <!-- Eyebrow -->
  <text x="40" y="30" class="mono" font-size="10" fill="#7A8099" letter-spacing="2">SPIN-FRAGETECHNIK · MODUL 10 · STRUKTURIERTE BEDARFSANALYSE</text>
  <line x1="40" y1="40" x2="820" y2="40" stroke="#E2E3E8" stroke-width="1"/>

  <!-- ═══ FUNNEL BANDS (trapezoids narrowing downward) ═══ -->

  <!-- S — Situation -->
  <polygon points="80,80 780,80 727.5,175 132.5,175" fill="#EDEDF3" stroke="#15192B" stroke-width="1"/>
  <text x="430" y="118" class="serif" font-size="16" fill="#1F2C56" font-weight="500" text-anchor="middle">S · Situationsfragen</text>
  <text x="430" y="140" class="mono" font-size="8" fill="#7A8099" text-anchor="middle">FAKTEN ERHEBEN · STATUS QUO</text>
  <text x="430" y="160" class="serif" font-size="12" font-style="italic" fill="#3D4460" text-anchor="middle">„Sie hatten +10 % Umsatz – was war der Haupttreiber?"</text>

  <!-- P — Problem -->
  <polygon points="132.5,185 727.5,185 675,280 185,280" fill="#D9C089" stroke="#15192B" stroke-width="1"/>
  <text x="430" y="223" class="serif" font-size="16" fill="#15192B" font-weight="500" text-anchor="middle">P · Problemfragen</text>
  <text x="430" y="245" class="mono" font-size="8" fill="#3D4460" text-anchor="middle">SCHWIERIGKEITEN AUFDECKEN</text>
  <text x="430" y="265" class="serif" font-size="12" font-style="italic" fill="#15192B" text-anchor="middle">„Wo haben Sie die größten Planungsunsicherheiten?"</text>

  <!-- I — Implikation -->
  <polygon points="185,290 675,290 622.5,385 237.5,385" fill="#3D5494" stroke="#15192B" stroke-width="1"/>
  <text x="430" y="328" class="serif" font-size="16" fill="#F8F8FA" font-weight="500" text-anchor="middle">I · Implikationsfragen</text>
  <text x="430" y="350" class="mono" font-size="8" fill="#8898C4" text-anchor="middle">FOLGEN BEWUSST MACHEN</text>
  <text x="430" y="370" class="serif" font-size="12" font-style="italic" fill="#F8F8FA" text-anchor="middle">„Was bedeutet das für Ihre Mitarbeiter, wenn …?"</text>

  <!-- N — Need-Payoff -->
  <polygon points="237.5,395 622.5,395 570,490 290,490" fill="#1F2C56" stroke="#1F2C56" stroke-width="1"/>
  <text x="430" y="433" class="serif" font-size="16" fill="#F8F8FA" font-weight="500" text-anchor="middle">N · Nutzenfragen</text>
  <text x="430" y="455" class="mono" font-size="8" fill="#8898C4" text-anchor="middle">WERT DER LÖSUNG ERFRAGEN</text>
  <text x="430" y="475" class="serif" font-size="12" font-style="italic" fill="#F8F8FA" text-anchor="middle">„Was wäre Ihnen eine feste Liquiditätslinie wert?"</text>

  <!-- Side direction labels -->
  <text x="60" y="135" class="mono" font-size="9" fill="#B0B3C0" letter-spacing="1" transform="rotate(-90 60 135)" text-anchor="middle">OFFEN &amp; BREIT</text>
  <text x="60" y="445" class="mono" font-size="9" fill="#B0B3C0" letter-spacing="1" transform="rotate(-90 60 445)" text-anchor="middle">FOKUSSIERT &amp; WERTORIENTIERT</text>

  <!-- Funnel direction arrow (down) -->
  <line x1="430" y1="505" x2="430" y2="535" stroke="#C8CAD4" stroke-width="1.5"/>
  <polygon points="430,548 421,533 439,533" fill="#C8CAD4"/>
  <text x="430" y="566" class="mono" font-size="8" fill="#7A8099" letter-spacing="1" text-anchor="middle">VOM KONTEXT ZUR KAUFMOTIVATION</text>

  <!-- Source -->
  <text x="40" y="592" class="mono" font-size="9" fill="#B0B3C0" letter-spacing="0.5">Rackham (1988) · SPIN Selling · bedarfsorientierte Gesprächsführung im Firmenkundengeschäft</text>
</svg>
