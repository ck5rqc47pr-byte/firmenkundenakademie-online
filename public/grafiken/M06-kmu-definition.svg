<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 560" width="860" height="560">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      text { font-family: Georgia, serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Source Serif 4', Georgia, serif; }
    </style>
  </defs>

  <rect width="860" height="560" fill="#F8F8FA"/>

  <text x="40" y="30" class="mono" font-size="10" fill="#7A8099" letter-spacing="2">ZWEI KMU-DEFINITIONEN · MODUL 06 · KMU-KOMPETENZ GRUNDLAGEN</text>
  <line x1="40" y1="40" x2="820" y2="40" stroke="#E2E3E8" stroke-width="1"/>

  <!-- ═══ LEFT: IfM Bonn ═══ -->
  <rect x="40" y="64" width="380" height="320" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="40" y="64" width="380" height="4" fill="#1F2C56"/>
  <text x="56" y="98" class="serif" font-size="16" fill="#1F2C56" font-weight="500">IfM Bonn</text>
  <text x="56" y="116" class="mono" font-size="8" fill="#7A8099">MITTELSTANDSDEFINITION · DEUTSCHLAND</text>

  <!-- header row -->
  <text x="56"  y="150" class="mono" font-size="8" fill="#B0B3C0" letter-spacing="0.5">KATEGORIE</text>
  <text x="230" y="150" class="mono" font-size="8" fill="#B0B3C0" letter-spacing="0.5">BESCHÄFTIGTE</text>
  <text x="330" y="150" class="mono" font-size="8" fill="#B0B3C0" letter-spacing="0.5">UMSATZ</text>
  <line x1="56" y1="158" x2="404" y2="158" stroke="#E2E3E8" stroke-width="1"/>

  <text x="56"  y="182" class="serif" font-size="12" fill="#1F2C56">Klein</text>
  <text x="230" y="182" class="mono" font-size="10" fill="#3D4460">&lt; 10</text>
  <text x="330" y="182" class="mono" font-size="10" fill="#3D4460">&lt; 2 Mio €</text>
  <line x1="56" y1="194" x2="404" y2="194" stroke="#F1F1F4" stroke-width="1"/>

  <text x="56"  y="218" class="serif" font-size="12" fill="#1F2C56">Mittel</text>
  <text x="230" y="218" class="mono" font-size="10" fill="#3D4460">10 – 499</text>
  <text x="330" y="218" class="mono" font-size="10" fill="#3D4460">2 – 49,9 Mio €</text>
  <line x1="56" y1="230" x2="404" y2="230" stroke="#F1F1F4" stroke-width="1"/>

  <text x="56"  y="254" class="serif" font-size="12" fill="#1F2C56" font-weight="500">KMU gesamt</text>
  <text x="230" y="254" class="mono" font-size="10" fill="#1F2C56" font-weight="500">&lt; 500</text>
  <text x="330" y="254" class="mono" font-size="10" fill="#1F2C56" font-weight="500">&lt; 50 Mio €</text>

  <rect x="56" y="288" width="348" height="76" fill="#F8F8FA"/>
  <text x="68" y="312" class="mono" font-size="8" fill="#7A8099">QUALITATIVES KERNMERKMAL</text>
  <text x="68" y="334" class="serif" font-size="13" font-style="italic" fill="#1F2C56">Einheit von Eigentum, Leitung</text>
  <text x="68" y="352" class="serif" font-size="13" font-style="italic" fill="#1F2C56">und Haftung</text>

  <!-- ═══ RIGHT: EU ═══ -->
  <rect x="440" y="64" width="380" height="320" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="440" y="64" width="380" height="4" fill="#D9C089"/>
  <text x="456" y="98" class="serif" font-size="16" fill="#1F2C56" font-weight="500">Europäische Kommission</text>
  <text x="456" y="116" class="mono" font-size="8" fill="#7A8099">EMPFEHLUNG 2003/361/EG</text>

  <text x="456" y="150" class="mono" font-size="8" fill="#B0B3C0" letter-spacing="0.5">KATEGORIE</text>
  <text x="592" y="150" class="mono" font-size="8" fill="#B0B3C0" letter-spacing="0.5">MA</text>
  <text x="648" y="150" class="mono" font-size="8" fill="#B0B3C0" letter-spacing="0.5">UMSATZ</text>
  <text x="744" y="150" class="mono" font-size="8" fill="#B0B3C0" letter-spacing="0.5">BILANZ</text>
  <line x1="456" y1="158" x2="804" y2="158" stroke="#E2E3E8" stroke-width="1"/>

  <text x="456" y="182" class="serif" font-size="12" fill="#1F2C56">Kleinst</text>
  <text x="592" y="182" class="mono" font-size="10" fill="#3D4460">&lt; 10</text>
  <text x="648" y="182" class="mono" font-size="10" fill="#3D4460">≤ 2 M</text>
  <text x="744" y="182" class="mono" font-size="10" fill="#3D4460">≤ 2 M</text>
  <line x1="456" y1="194" x2="804" y2="194" stroke="#F1F1F4" stroke-width="1"/>

  <text x="456" y="218" class="serif" font-size="12" fill="#1F2C56">Klein</text>
  <text x="592" y="218" class="mono" font-size="10" fill="#3D4460">&lt; 50</text>
  <text x="648" y="218" class="mono" font-size="10" fill="#3D4460">≤ 10 M</text>
  <text x="744" y="218" class="mono" font-size="10" fill="#3D4460">≤ 10 M</text>
  <line x1="456" y1="230" x2="804" y2="230" stroke="#F1F1F4" stroke-width="1"/>

  <text x="456" y="254" class="serif" font-size="12" fill="#1F2C56" font-weight="500">Mittel</text>
  <text x="592" y="254" class="mono" font-size="10" fill="#1F2C56" font-weight="500">&lt; 250</text>
  <text x="648" y="254" class="mono" font-size="10" fill="#1F2C56" font-weight="500">≤ 50 M</text>
  <text x="744" y="254" class="mono" font-size="10" fill="#1F2C56" font-weight="500">≤ 43 M</text>

  <rect x="456" y="288" width="348" height="76" fill="#F8F8FA"/>
  <text x="468" y="312" class="mono" font-size="8" fill="#7A8099">KOMBINATIONSREGEL</text>
  <text x="468" y="334" class="serif" font-size="13" font-style="italic" fill="#1F2C56">Mitarbeiterzahl UND</text>
  <text x="468" y="352" class="serif" font-size="13" font-style="italic" fill="#1F2C56">(Umsatz ODER Bilanzsumme)</text>

  <!-- ═══ Volkswirtschaftliche Eckwerte ═══ -->
  <text x="40" y="420" class="mono" font-size="9" fill="#7A8099" letter-spacing="1">BEDEUTUNG DER KMU IN DEUTSCHLAND</text>
  <rect x="40" y="432" width="184" height="74" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="236" y="432" width="184" height="74" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="432" y="432" width="184" height="74" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="628" y="432" width="192" height="74" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <text x="132" y="470" class="serif" font-size="24" fill="#1F2C56" text-anchor="middle">99,4 %</text>
  <text x="132" y="492" class="mono" font-size="8" fill="#7A8099" text-anchor="middle">aller Unternehmen</text>
  <text x="328" y="470" class="serif" font-size="24" fill="#1F2C56" text-anchor="middle">55 %</text>
  <text x="328" y="492" class="mono" font-size="8" fill="#7A8099" text-anchor="middle">Nettowertschöpfung</text>
  <text x="524" y="470" class="serif" font-size="24" fill="#1F2C56" text-anchor="middle">~60 %</text>
  <text x="524" y="492" class="mono" font-size="8" fill="#7A8099" text-anchor="middle">SV-Arbeitsplätze</text>
  <text x="724" y="470" class="serif" font-size="24" fill="#1F2C56" text-anchor="middle">&gt; 80 %</text>
  <text x="724" y="492" class="mono" font-size="8" fill="#7A8099" text-anchor="middle">aller Auszubildenden</text>

  <text x="40" y="540" class="mono" font-size="9" fill="#B0B3C0" letter-spacing="0.5">IfM Bonn (2024) · Europäische Kommission, Empfehlung 2003/361/EG · Mittelstandsdefinition</text>
</svg>
