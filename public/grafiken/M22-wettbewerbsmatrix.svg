<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 560" width="860" height="560">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      text { font-family: Georgia, serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Source Serif 4', Georgia, serif; }
    </style>
  </defs>

  <rect width="860" height="560" fill="#F8F8FA"/>

  <text x="40" y="30" class="mono" font-size="10" fill="#7A8099" letter-spacing="2">WETTBEWERBSSTRATEGIE-MATRIX · MODUL 22 · GESCHÄFTSMODELL UND STRATEGIE</text>
  <line x1="40" y1="40" x2="820" y2="40" stroke="#E2E3E8" stroke-width="1"/>

  <!-- axis titles -->
  <text x="505" y="74" class="mono" font-size="9" fill="#7A8099" letter-spacing="1" text-anchor="middle">WETTBEWERBSVORTEIL</text>
  <text x="365" y="110" class="mono" font-size="9" fill="#3D4460" letter-spacing="0.5" text-anchor="middle">NIEDRIGE KOSTEN</text>
  <text x="645" y="110" class="mono" font-size="9" fill="#3D4460" letter-spacing="0.5" text-anchor="middle">DIFFERENZIERUNG</text>

  <text x="66" y="280" class="mono" font-size="9" fill="#7A8099" letter-spacing="1" transform="rotate(-90 66 280)" text-anchor="middle">WETTBEWERBSFELD</text>
  <text x="222" y="198" class="mono" font-size="9" fill="#3D4460" text-anchor="end">BRANCHEN-</text>
  <text x="222" y="211" class="mono" font-size="9" fill="#3D4460" text-anchor="end">WEIT</text>
  <text x="222" y="352" class="mono" font-size="9" fill="#3D4460" text-anchor="end">SEGMENT /</text>
  <text x="222" y="365" class="mono" font-size="9" fill="#3D4460" text-anchor="end">NISCHE</text>

  <!-- TL Kostenführerschaft -->
  <rect x="230" y="130" width="270" height="145" fill="#1F2C56"/>
  <text x="250" y="170" class="serif" font-size="17" fill="#F8F8FA" font-weight="500">Kostenführerschaft</text>
  <text x="250" y="206" class="serif" font-size="12" fill="#8898C4">Branchenweit der günstigste</text>
  <text x="250" y="224" class="serif" font-size="12" fill="#8898C4">Anbieter – Skalen &amp; Effizienz.</text>

  <!-- TR Differenzierung -->
  <rect x="510" y="130" width="270" height="145" fill="#3D5494"/>
  <text x="530" y="170" class="serif" font-size="17" fill="#F8F8FA" font-weight="500">Differenzierung</text>
  <text x="530" y="206" class="serif" font-size="12" fill="#D6DCEC">Branchenweit einzigartiger</text>
  <text x="530" y="224" class="serif" font-size="12" fill="#D6DCEC">Nutzen – Premium-Position.</text>

  <!-- BL Kostenfokus -->
  <rect x="230" y="285" width="270" height="145" fill="#FFFFFF" stroke="#D9C089" stroke-width="2"/>
  <text x="250" y="325" class="serif" font-size="17" fill="#1F2C56" font-weight="500">Kostenfokus</text>
  <text x="250" y="361" class="serif" font-size="12" fill="#3D4460">Günstigster Anbieter in</text>
  <text x="250" y="379" class="serif" font-size="12" fill="#3D4460">einem engen Segment.</text>
  <text x="250" y="408" class="mono" font-size="8" fill="#B0B3C0">FOKUSSTRATEGIE</text>

  <!-- BR Differenzierungsfokus -->
  <rect x="510" y="285" width="270" height="145" fill="#FFFFFF" stroke="#D9C089" stroke-width="2"/>
  <text x="530" y="325" class="serif" font-size="17" fill="#1F2C56" font-weight="500">Differenzierungsfokus</text>
  <text x="530" y="361" class="serif" font-size="12" fill="#3D4460">Einzigartiger Nutzen in</text>
  <text x="530" y="379" class="serif" font-size="12" fill="#3D4460">einem engen Segment.</text>
  <text x="530" y="408" class="mono" font-size="8" fill="#B0B3C0">FOKUSSTRATEGIE</text>

  <!-- Stuck in the middle warning -->
  <rect x="230" y="450" width="550" height="56" fill="#FFFFFF" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="230" y="450" width="6" height="56" fill="#ef4444"/>
  <text x="254" y="476" class="mono" font-size="8" fill="#ef4444" letter-spacing="0.5">STRATEGISCHE FALLE</text>
  <text x="254" y="496" class="serif" font-size="13" fill="#1F2C56">Wer sich nicht entscheidet, bleibt „stuck in the middle“ – ohne klaren Wettbewerbsvorteil.</text>

  <text x="40" y="544" class="mono" font-size="9" fill="#B0B3C0" letter-spacing="0.5">Porter (1980) zu generischen Wettbewerbsstrategien · Stuck-in-the-Middle · strategische Positionierung</text>
</svg>
