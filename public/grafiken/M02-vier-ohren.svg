<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 600" width="860" height="600">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      text { font-family: Georgia, serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Source Serif 4', Georgia, serif; }
    </style>
  </defs>

  <rect width="860" height="600" fill="#F8F8FA"/>

  <text x="40" y="30" class="mono" font-size="10" fill="#7A8099" letter-spacing="2">VIER-OHREN-MODELL · MODUL 02 · BILANZGESPRÄCH AUF AUGENHÖHE</text>
  <line x1="40" y1="40" x2="820" y2="40" stroke="#E2E3E8" stroke-width="1"/>

  <!-- connectors -->
  <line x1="430" y1="240" x2="430" y2="196" stroke="#C8CAD4" stroke-width="1"/>
  <line x1="430" y1="372" x2="430" y2="416" stroke="#C8CAD4" stroke-width="1"/>
  <line x1="352" y1="306" x2="320" y2="306" stroke="#C8CAD4" stroke-width="1"/>
  <line x1="508" y1="306" x2="540" y2="306" stroke="#C8CAD4" stroke-width="1"/>

  <!-- center message -->
  <rect x="352" y="240" width="156" height="132" fill="#1F2C56"/>
  <text x="430" y="296" class="mono" font-size="10" fill="#8898C4" letter-spacing="1" text-anchor="middle">EINE NACHRICHT</text>
  <text x="430" y="320" class="serif" font-size="15" fill="#F8F8FA" text-anchor="middle">hat vier</text>
  <text x="430" y="340" class="serif" font-size="15" fill="#F8F8FA" text-anchor="middle">Seiten</text>

  <!-- TOP: Sachinhalt -->
  <rect x="320" y="76" width="220" height="120" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="320" y="76" width="220" height="4" fill="#1F2C56"/>
  <text x="336" y="104" class="mono" font-size="8" fill="#B0B3C0">1 · SACHINHALT</text>
  <text x="336" y="128" class="serif" font-size="15" fill="#1F2C56" font-weight="500">Worüber ich informiere</text>
  <text x="336" y="154" class="serif" font-size="12" font-style="italic" fill="#3D4460">„Die EK-Quote liegt bei 18 %."</text>
  <text x="336" y="176" class="serif" font-size="11" fill="#7A8099">Die reine Sachaussage / Daten &amp; Fakten.</text>

  <!-- LEFT: Selbstoffenbarung -->
  <rect x="40" y="246" width="280" height="120" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="40" y="246" width="280" height="4" fill="#3D5494"/>
  <text x="56" y="274" class="mono" font-size="8" fill="#B0B3C0">2 · SELBSTOFFENBARUNG</text>
  <text x="56" y="298" class="serif" font-size="15" fill="#1F2C56" font-weight="500">Was ich von mir zeige</text>
  <text x="56" y="324" class="serif" font-size="12" font-style="italic" fill="#3D4460">„Mir ist Sicherheit wichtig."</text>
  <text x="56" y="346" class="serif" font-size="11" fill="#7A8099">Werte, Haltung &amp; Befindlichkeit des Senders.</text>

  <!-- RIGHT: Beziehung -->
  <rect x="540" y="246" width="280" height="120" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="540" y="246" width="280" height="4" fill="#D9C089"/>
  <text x="556" y="274" class="mono" font-size="8" fill="#B0B3C0">3 · BEZIEHUNG</text>
  <text x="556" y="298" class="serif" font-size="15" fill="#1F2C56" font-weight="500">Wie ich zu dir stehe</text>
  <text x="556" y="324" class="serif" font-size="12" font-style="italic" fill="#3D4460">„Ich nehme Sie als Partner ernst."</text>
  <text x="556" y="346" class="serif" font-size="11" fill="#7A8099">Was der Sender vom Empfänger hält.</text>

  <!-- BOTTOM: Appell -->
  <rect x="320" y="416" width="220" height="120" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="320" y="416" width="220" height="4" fill="#1F2C56"/>
  <text x="336" y="444" class="mono" font-size="8" fill="#B0B3C0">4 · APPELL</text>
  <text x="336" y="468" class="serif" font-size="15" fill="#1F2C56" font-weight="500">Wozu ich anregen will</text>
  <text x="336" y="494" class="serif" font-size="12" font-style="italic" fill="#3D4460">„Lassen Sie uns nachsteuern."</text>
  <text x="336" y="516" class="serif" font-size="11" fill="#7A8099">Wunsch, Aufforderung oder Handlungsimpuls.</text>

  <text x="40" y="578" class="mono" font-size="9" fill="#B0B3C0" letter-spacing="0.5">Schulz von Thun (1981) Miteinander reden · Vier Seiten einer Nachricht · Kommunikation im Bilanzgespräch</text>
</svg>
