<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 540" width="860" height="540">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      text { font-family: Georgia, serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Source Serif 4', Georgia, serif; }
    </style>
  </defs>

  <rect width="860" height="540" fill="#F8F8FA"/>

  <text x="40" y="30" class="mono" font-size="10" fill="#7A8099" letter-spacing="2">NACHFOLGE-PHASENMODELL · MODUL 12 · CEO-DIALOG UND NACHFOLGE</text>
  <line x1="40" y1="40" x2="820" y2="40" stroke="#E2E3E8" stroke-width="1"/>

  <text x="40" y="68" class="mono" font-size="9" fill="#7A8099" letter-spacing="1">FÜNF PHASEN · ZEITSTRAHL RELATIV ZUM ÜBERGABEJAHR</text>

  <!-- ═══ Phase 1 ═══ -->
  <rect x="40" y="100" width="143" height="320" fill="#EDEDF3" stroke="#D8D9E0" stroke-width="1"/>
  <text x="56" y="150" class="serif" font-size="30" fill="#3D5494" font-weight="500">1</text>
  <text x="56" y="192" class="serif" font-size="14" fill="#1F2C56" font-weight="500">Bewusstseins-</text>
  <text x="56" y="210" class="serif" font-size="14" fill="#1F2C56" font-weight="500">bildung</text>
  <line x1="56" y1="226" x2="167" y2="226" stroke="#D8D9E0" stroke-width="1"/>
  <text x="56" y="248" class="mono" font-size="8" fill="#7A8099">JAHR −3 bis −2</text>
  <text x="56" y="280" class="serif" font-size="11" fill="#3D4460">Eigentümer erkennt</text>
  <text x="56" y="296" class="serif" font-size="11" fill="#3D4460">Nachfolgebedarf;</text>
  <text x="56" y="312" class="serif" font-size="11" fill="#3D4460">erste Optionen.</text>

  <!-- ═══ Phase 2 ═══ -->
  <rect x="199" y="100" width="143" height="320" fill="#3D5494"/>
  <text x="215" y="150" class="serif" font-size="30" fill="#D9C089" font-weight="500">2</text>
  <text x="215" y="192" class="serif" font-size="14" fill="#F8F8FA" font-weight="500">Vorbereitung</text>
  <line x1="215" y1="226" x2="326" y2="226" stroke="#F8F8FA" stroke-width="0.5" opacity="0.25"/>
  <text x="215" y="248" class="mono" font-size="8" fill="#8898C4">JAHR −2 bis −1</text>
  <text x="215" y="280" class="serif" font-size="11" fill="#F8F8FA">Bewertung,</text>
  <text x="215" y="296" class="serif" font-size="11" fill="#F8F8FA">Nachfolgersuche,</text>
  <text x="215" y="312" class="serif" font-size="11" fill="#F8F8FA">Steuer &amp; Recht.</text>

  <!-- ═══ Phase 3 ═══ -->
  <rect x="358" y="100" width="143" height="320" fill="#1F2C56"/>
  <text x="374" y="150" class="serif" font-size="30" fill="#D9C089" font-weight="500">3</text>
  <text x="374" y="192" class="serif" font-size="14" fill="#F8F8FA" font-weight="500">Entscheidung</text>
  <text x="374" y="210" class="serif" font-size="14" fill="#F8F8FA" font-weight="500">&amp; Verhandlung</text>
  <line x1="374" y1="226" x2="485" y2="226" stroke="#F8F8FA" stroke-width="0.5" opacity="0.25"/>
  <text x="374" y="248" class="mono" font-size="8" fill="#8898C4">JAHR −1</text>
  <text x="374" y="280" class="serif" font-size="11" fill="#F8F8FA">Auswahl,</text>
  <text x="374" y="296" class="serif" font-size="11" fill="#F8F8FA">Verhandlung,</text>
  <text x="374" y="312" class="serif" font-size="11" fill="#F8F8FA">Vertragsabschluss.</text>

  <!-- ═══ Phase 4 (peak) ═══ -->
  <rect x="517" y="100" width="143" height="320" fill="#1F2C56"/>
  <rect x="517" y="100" width="143" height="5" fill="#D9C089"/>
  <text x="533" y="152" class="serif" font-size="30" fill="#D9C089" font-weight="500">4</text>
  <text x="533" y="192" class="serif" font-size="14" fill="#F8F8FA" font-weight="500">Handover</text>
  <line x1="533" y1="226" x2="644" y2="226" stroke="#F8F8FA" stroke-width="0.5" opacity="0.25"/>
  <text x="533" y="248" class="mono" font-size="8" fill="#8898C4">ÜBERGABEJAHR 0</text>
  <text x="533" y="280" class="serif" font-size="11" fill="#F8F8FA">Operative Übergabe,</text>
  <text x="533" y="296" class="serif" font-size="11" fill="#F8F8FA">Mitarbeiter</text>
  <text x="533" y="312" class="serif" font-size="11" fill="#F8F8FA">&amp; Kunden.</text>

  <!-- ═══ Phase 5 ═══ -->
  <rect x="676" y="100" width="143" height="320" fill="#3D5494"/>
  <text x="692" y="150" class="serif" font-size="30" fill="#D9C089" font-weight="500">5</text>
  <text x="692" y="192" class="serif" font-size="14" fill="#F8F8FA" font-weight="500">Nach-</text>
  <text x="692" y="210" class="serif" font-size="14" fill="#F8F8FA" font-weight="500">begleitung</text>
  <line x1="692" y1="226" x2="803" y2="226" stroke="#F8F8FA" stroke-width="0.5" opacity="0.25"/>
  <text x="692" y="248" class="mono" font-size="8" fill="#8898C4">JAHR +1 bis +2</text>
  <text x="692" y="280" class="serif" font-size="11" fill="#F8F8FA">Begleitung,</text>
  <text x="692" y="296" class="serif" font-size="11" fill="#F8F8FA">Stabilisierung,</text>
  <text x="692" y="312" class="serif" font-size="11" fill="#F8F8FA">Wissenstransfer.</text>

  <!-- arrows between phases -->
  <polygon points="198,260 188,252 188,268" fill="#C8CAD4"/>
  <polygon points="357,260 347,252 347,268" fill="#C8CAD4"/>
  <polygon points="516,260 506,252 506,268" fill="#C8CAD4"/>
  <polygon points="675,260 665,252 665,268" fill="#C8CAD4"/>

  <!-- duration banner -->
  <rect x="40" y="448" width="779" height="48" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <text x="429" y="478" class="serif" font-size="14" fill="#1F2C56" text-anchor="middle">Gesamtdauer eines strukturierten Nachfolgeprozesses · 3–7 Jahre</text>

  <text x="40" y="526" class="mono" font-size="9" fill="#B0B3C0" letter-spacing="0.5">IfM Bonn (2016) zur Unternehmensnachfolge · Kübler-Ross (1969) · Phasenmodell der Unternehmensnachfolge</text>
</svg>
