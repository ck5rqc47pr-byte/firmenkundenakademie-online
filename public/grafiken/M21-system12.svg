<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 560" width="860" height="560">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      text { font-family: Georgia, serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Source Serif 4', Georgia, serif; }
    </style>
  </defs>

  <rect width="860" height="560" fill="#F8F8FA"/>

  <text x="40" y="30" class="mono" font-size="10" fill="#7A8099" letter-spacing="2">ZWEI DENKSYSTEME · MODUL 21 · KREDITENTSCHEIDUNG TREFFEN</text>
  <line x1="40" y1="40" x2="820" y2="40" stroke="#E2E3E8" stroke-width="1"/>

  <!-- System 1 -->
  <rect x="40" y="76" width="380" height="356" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="40" y="76" width="380" height="64" fill="#D9C089"/>
  <text x="64" y="110" class="serif" font-size="22" fill="#15192B" font-weight="500">System 1</text>
  <text x="64" y="130" class="mono" font-size="9" fill="#15192B">SCHNELL · INTUITIV · AUTOMATISCH</text>

  <text x="64" y="180" class="serif" font-size="13" fill="#3D4460">· Mühelos &amp; automatisch</text>
  <text x="64" y="212" class="serif" font-size="13" fill="#3D4460">· Emotional &amp; assoziativ</text>
  <text x="64" y="244" class="serif" font-size="13" fill="#3D4460">· Schnelle Bauchurteile</text>
  <text x="64" y="276" class="serif" font-size="13" fill="#3D4460">· Mustererkennung in Sekunden</text>

  <rect x="64" y="312" width="332" height="96" fill="#FBEFD6"/>
  <text x="80" y="338" class="mono" font-size="8" fill="#a06b00">RISIKO IN DER KREDITENTSCHEIDUNG</text>
  <text x="80" y="362" class="serif" font-size="12" fill="#3D4460">Anfällig für kognitive Verzerrungen –</text>
  <text x="80" y="380" class="serif" font-size="12" fill="#3D4460">Halo-Effekt, Ankerung, Verfügbarkeits-</text>
  <text x="80" y="398" class="serif" font-size="12" fill="#3D4460">heuristik, Bestätigungsfehler.</text>

  <!-- System 2 -->
  <rect x="440" y="76" width="380" height="356" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="440" y="76" width="380" height="64" fill="#1F2C56"/>
  <text x="464" y="110" class="serif" font-size="22" fill="#F8F8FA" font-weight="500">System 2</text>
  <text x="464" y="130" class="mono" font-size="9" fill="#8898C4">LANGSAM · ANALYTISCH · BEWUSST</text>

  <text x="464" y="180" class="serif" font-size="13" fill="#3D4460">· Bewusst &amp; kontrolliert</text>
  <text x="464" y="212" class="serif" font-size="13" fill="#3D4460">· Logisch &amp; regelbasiert</text>
  <text x="464" y="244" class="serif" font-size="13" fill="#3D4460">· Langsam &amp; anstrengend</text>
  <text x="464" y="276" class="serif" font-size="13" fill="#3D4460">· Prüft &amp; korrigiert System 1</text>

  <rect x="464" y="312" width="332" height="96" fill="#EDEDF3"/>
  <text x="480" y="338" class="mono" font-size="8" fill="#3D5494">STÄRKE IN DER KREDITENTSCHEIDUNG</text>
  <text x="480" y="362" class="serif" font-size="12" fill="#3D4460">Strukturierte Analyse, Kennzahlen-</text>
  <text x="480" y="380" class="serif" font-size="12" fill="#3D4460">prüfung und bewusstes Abwägen –</text>
  <text x="480" y="398" class="serif" font-size="12" fill="#3D4460">die Basis belastbarer Entscheidungen.</text>

  <!-- bottom banner -->
  <rect x="40" y="450" width="780" height="60" fill="#1F2C56"/>
  <text x="64" y="478" class="mono" font-size="8" fill="#D9C089" letter-spacing="1">DEBIASING</text>
  <text x="64" y="498" class="serif" font-size="13" fill="#F8F8FA">Gute Kreditentscheidungen aktivieren bewusst System 2 – Checklisten und Strukturen bremsen die Schnellurteile von System 1.</text>

  <text x="40" y="544" class="mono" font-size="9" fill="#B0B3C0" letter-spacing="0.5">Kahneman (2011) Schnelles Denken, langsames Denken · Dual-Process-Theorie · Debiasing in der Kreditentscheidung</text>
</svg>
