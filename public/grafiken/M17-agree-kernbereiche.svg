<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 540" width="860" height="540">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      text { font-family: Georgia, serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Source Serif 4', Georgia, serif; }
    </style>
  </defs>

  <rect width="860" height="540" fill="#F8F8FA"/>

  <text x="40" y="30" class="mono" font-size="10" fill="#7A8099" letter-spacing="2">DIGITALE WERKZEUGE · MODUL 17 · AGREE21 UND DIGITALE TOOLS</text>
  <line x1="40" y1="40" x2="820" y2="40" stroke="#E2E3E8" stroke-width="1"/>

  <text x="40" y="68" class="mono" font-size="9" fill="#7A8099" letter-spacing="1">FÜNF KERNBEREICHE IM DIGITALEN BERATER-ARBEITSPLATZ</text>

  <!-- Bereich 1 -->
  <rect x="40" y="84" width="143" height="320" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="40" y="84" width="143" height="4" fill="#1F2C56"/>
  <text x="56" y="116" class="mono" font-size="8" fill="#B0B3C0">BEREICH 1</text>
  <text x="56" y="144" class="serif" font-size="14" fill="#1F2C56" font-weight="500">CRM /</text>
  <text x="56" y="162" class="serif" font-size="14" fill="#1F2C56" font-weight="500">Kundenprofil</text>
  <line x1="56" y1="178" x2="167" y2="178" stroke="#F1F1F4" stroke-width="1"/>
  <text x="56" y="204" class="serif" font-size="11" fill="#3D4460">360°-Sicht auf</text>
  <text x="56" y="220" class="serif" font-size="11" fill="#3D4460">den Kunden,</text>
  <text x="56" y="236" class="serif" font-size="11" fill="#3D4460">Historie &amp; Bedarf.</text>

  <!-- Bereich 2 -->
  <rect x="199" y="84" width="143" height="320" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="199" y="84" width="143" height="4" fill="#3D5494"/>
  <text x="215" y="116" class="mono" font-size="8" fill="#B0B3C0">BEREICH 2</text>
  <text x="215" y="144" class="serif" font-size="14" fill="#1F2C56" font-weight="500">Kredit-</text>
  <text x="215" y="162" class="serif" font-size="14" fill="#1F2C56" font-weight="500">bearbeitung</text>
  <line x1="215" y1="178" x2="326" y2="178" stroke="#F1F1F4" stroke-width="1"/>
  <text x="215" y="204" class="serif" font-size="11" fill="#3D4460">Antrag, Rating,</text>
  <text x="215" y="220" class="serif" font-size="11" fill="#3D4460">Beschluss,</text>
  <text x="215" y="236" class="serif" font-size="11" fill="#3D4460">Dokumentation.</text>

  <!-- Bereich 3 -->
  <rect x="358" y="84" width="143" height="320" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="358" y="84" width="143" height="4" fill="#D9C089"/>
  <text x="374" y="116" class="mono" font-size="8" fill="#B0B3C0">BEREICH 3</text>
  <text x="374" y="144" class="serif" font-size="14" fill="#1F2C56" font-weight="500">Unternehmer-</text>
  <text x="374" y="162" class="serif" font-size="14" fill="#1F2C56" font-weight="500">Dialog</text>
  <line x1="374" y1="178" x2="485" y2="178" stroke="#F1F1F4" stroke-width="1"/>
  <text x="374" y="204" class="serif" font-size="11" fill="#3D4460">Strukturierte</text>
  <text x="374" y="220" class="serif" font-size="11" fill="#3D4460">Gesprächs-</text>
  <text x="374" y="236" class="serif" font-size="11" fill="#3D4460">vorbereitung.</text>

  <!-- Bereich 4 -->
  <rect x="517" y="84" width="143" height="320" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="517" y="84" width="143" height="4" fill="#1F2C56"/>
  <text x="533" y="116" class="mono" font-size="8" fill="#B0B3C0">BEREICH 4</text>
  <text x="533" y="144" class="serif" font-size="14" fill="#1F2C56" font-weight="500">Controlling &amp;</text>
  <text x="533" y="162" class="serif" font-size="14" fill="#1F2C56" font-weight="500">Reporting</text>
  <line x1="533" y1="178" x2="644" y2="178" stroke="#F1F1F4" stroke-width="1"/>
  <text x="533" y="204" class="serif" font-size="11" fill="#3D4460">Kennzahlen &amp;</text>
  <text x="533" y="220" class="serif" font-size="11" fill="#3D4460">Portfolio-</text>
  <text x="533" y="236" class="serif" font-size="11" fill="#3D4460">steuerung.</text>

  <!-- Bereich 5 -->
  <rect x="676" y="84" width="143" height="320" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="676" y="84" width="143" height="4" fill="#3D5494"/>
  <text x="692" y="116" class="mono" font-size="8" fill="#B0B3C0">BEREICH 5</text>
  <text x="692" y="144" class="serif" font-size="14" fill="#1F2C56" font-weight="500">Zahlungs-</text>
  <text x="692" y="162" class="serif" font-size="14" fill="#1F2C56" font-weight="500">verkehr</text>
  <line x1="692" y1="178" x2="803" y2="178" stroke="#F1F1F4" stroke-width="1"/>
  <text x="692" y="204" class="serif" font-size="11" fill="#3D4460">Abwicklung &amp;</text>
  <text x="692" y="220" class="serif" font-size="11" fill="#3D4460">Cross-Selling-</text>
  <text x="692" y="236" class="serif" font-size="11" fill="#3D4460">Impulse.</text>

  <!-- KPI banner -->
  <rect x="40" y="436" width="779" height="56" fill="#1F2C56"/>
  <text x="64" y="474" class="serif" font-size="26" fill="#D9C089" font-weight="500">35–40 %</text>
  <text x="186" y="462" class="serif" font-size="13" fill="#F8F8FA">der Beraterzeit entfällt auf administrative Tätigkeiten –</text>
  <text x="186" y="480" class="serif" font-size="13" fill="#F8F8FA">digitale Werkzeuge schaffen Freiraum für Beratung.</text>

  <text x="40" y="524" class="mono" font-size="9" fill="#B0B3C0" letter-spacing="0.5">Davis (1989) TAM · Venkatesh et al. (2003) UTAUT · zeb (2022) · digitale Werkzeuge im Firmenkundengeschäft</text>
</svg>
