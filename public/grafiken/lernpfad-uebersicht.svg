<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 500" width="860" height="500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      text { font-family: Georgia, serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Source Serif 4', Georgia, serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="860" height="500" fill="#F8F8FA"/>

  <!-- Eyebrow -->
  <text x="40" y="30" class="mono" font-size="10" fill="#7A8099" letter-spacing="2">LERNPFAD · FKB CAMPUS · 22 MODULE IN 3 ETAPPEN</text>
  <line x1="40" y1="40" x2="820" y2="40" stroke="#E2E3E8" stroke-width="1"/>

  <!-- ══════════════════════════════════════════════
       3 gleich breite Panels (260px) mit 10px Abstand
       y=60 bis y=420 (360px hoch)
       ══════════════════════════════════════════════ -->

  <!-- ── Etappe I: Beraterhandwerk — bg-2 #EDEDF3 ── -->
  <rect x="40" y="60" width="260" height="360" fill="#EDEDF3"/>
  <rect x="40" y="60" width="260" height="360" fill="none" stroke="#15192B" stroke-width="1"/>
  <!-- Roman numeral -->
  <text x="62" y="126" class="serif" font-size="54" font-style="italic" fill="#1F2C56">I.</text>
  <!-- Etappe name -->
  <text x="62" y="154" class="serif" font-size="17" fill="#15192B" font-weight="500">Beraterhandwerk</text>
  <!-- Dreyfus label -->
  <text x="62" y="171" class="mono" font-size="9" fill="#7A8099" letter-spacing="1">BERATER · DREYFUS STUFE 2</text>
  <!-- Separator -->
  <line x1="62" y1="185" x2="280" y2="185" stroke="#15192B" stroke-width="0.5" opacity="0.2"/>
  <!-- Core themes -->
  <text x="62" y="204" class="mono" font-size="9" fill="#7A8099" letter-spacing="0.5">Fachliche Grundlagen</text>
  <text x="62" y="222" class="mono" font-size="9" fill="#7A8099" letter-spacing="0.5">Bilanzlesen &amp; -analyse</text>
  <text x="62" y="240" class="mono" font-size="9" fill="#7A8099" letter-spacing="0.5">Kreditrisiko-Grundlagen</text>
  <text x="62" y="258" class="mono" font-size="9" fill="#7A8099" letter-spacing="0.5">Branchenverständnis</text>
  <!-- Separator 2 -->
  <line x1="62" y1="272" x2="280" y2="272" stroke="#15192B" stroke-width="0.5" opacity="0.2"/>
  <!-- Bloom focus -->
  <text x="62" y="288" class="mono" font-size="9" fill="#9A9DB0" letter-spacing="1">BLOOM-FOKUS</text>
  <text x="62" y="305" class="serif" font-size="13" fill="#1F2C56">Analysieren · Verstehen</text>
  <!-- Kompetenzfelder -->
  <text x="62" y="330" class="mono" font-size="8" fill="#9A9DB0" letter-spacing="1">KOMPETENZFELDER</text>
  <text x="62" y="346" class="mono" font-size="9" fill="#3D4460" letter-spacing="0.5">K-01 Finanzanalyse</text>
  <text x="62" y="362" class="mono" font-size="9" fill="#3D4460" letter-spacing="0.5">K-02 Branchenwissen</text>

  <!-- Connector arrow I → II -->
  <polygon points="302,237 318,240 302,243" fill="#C8CAD4"/>

  <!-- ── Etappe II: Sparringspartner — accent #D9C089 ── -->
  <rect x="330" y="60" width="260" height="360" fill="#D9C089"/>
  <rect x="330" y="60" width="260" height="360" fill="none" stroke="#15192B" stroke-width="1"/>
  <text x="352" y="126" class="serif" font-size="54" font-style="italic" fill="#15192B">II.</text>
  <text x="352" y="154" class="serif" font-size="17" fill="#15192B" font-weight="500">Sparringspartner</text>
  <text x="352" y="171" class="mono" font-size="9" fill="#3D4460" letter-spacing="1">SPARRING · DREYFUS STUFE 3</text>
  <line x1="352" y1="185" x2="570" y2="185" stroke="#15192B" stroke-width="0.5" opacity="0.2"/>
  <text x="352" y="204" class="mono" font-size="9" fill="#3D4460" letter-spacing="0.5">Gesprächsführung &amp; Beratung</text>
  <text x="352" y="222" class="mono" font-size="9" fill="#3D4460" letter-spacing="0.5">Bilanzgespräch auf Augenhöhe</text>
  <text x="352" y="240" class="mono" font-size="9" fill="#3D4460" letter-spacing="0.5">Bedarfsanalyse</text>
  <text x="352" y="258" class="mono" font-size="9" fill="#3D4460" letter-spacing="0.5">Kreditentscheidung</text>
  <line x1="352" y1="272" x2="570" y2="272" stroke="#15192B" stroke-width="0.5" opacity="0.2"/>
  <text x="352" y="288" class="mono" font-size="9" fill="#7A6A30" letter-spacing="1">BLOOM-FOKUS</text>
  <text x="352" y="305" class="serif" font-size="13" fill="#15192B">Anwenden · Evaluieren</text>
  <text x="352" y="330" class="mono" font-size="8" fill="#7A6A30" letter-spacing="1">KOMPETENZFELDER</text>
  <text x="352" y="346" class="mono" font-size="9" fill="#3D4460" letter-spacing="0.5">K-03 Gesprächsführung</text>
  <text x="352" y="362" class="mono" font-size="9" fill="#3D4460" letter-spacing="0.5">K-04 Vertrieb</text>

  <!-- Connector arrow II → III -->
  <polygon points="592,237 608,240 592,243" fill="#C8CAD4"/>

  <!-- ── Etappe III: Strategischer Partner — primary #1F2C56 ── -->
  <rect x="620" y="60" width="200" height="360" fill="#1F2C56"/>
  <rect x="620" y="60" width="200" height="360" fill="none" stroke="#1F2C56" stroke-width="1"/>
  <!-- Accent top bar -->
  <rect x="620" y="60" width="200" height="4" fill="#D9C089"/>
  <text x="642" y="126" class="serif" font-size="54" font-style="italic" fill="#D9C089">III.</text>
  <text x="642" y="154" class="serif" font-size="17" fill="#F8F8FA" font-weight="500">Strategischer</text>
  <text x="642" y="174" class="serif" font-size="17" fill="#F8F8FA" font-weight="500">Partner</text>
  <text x="642" y="191" class="mono" font-size="9" fill="#8898C4" letter-spacing="1">STRATEGE · DREYFUS STUFE 4</text>
  <line x1="642" y1="203" x2="800" y2="203" stroke="#F8F8FA" stroke-width="0.5" opacity="0.25"/>
  <text x="642" y="220" class="mono" font-size="9" fill="#8898C4" letter-spacing="0.5">Strategischer Finanzdialog</text>
  <text x="642" y="238" class="mono" font-size="9" fill="#8898C4" letter-spacing="0.5">CEO-Dialog &amp; Nachfolge</text>
  <text x="642" y="256" class="mono" font-size="9" fill="#8898C4" letter-spacing="0.5">Branchenrisiken &amp; ESG</text>
  <text x="642" y="274" class="mono" font-size="9" fill="#8898C4" letter-spacing="0.5">Führung &amp; Positionierung</text>
  <line x1="642" y1="288" x2="800" y2="288" stroke="#F8F8FA" stroke-width="0.5" opacity="0.25"/>
  <text x="642" y="304" class="mono" font-size="9" fill="#5A6A9A" letter-spacing="1">BLOOM-FOKUS</text>
  <text x="642" y="321" class="serif" font-size="13" fill="#F8F8FA">Erschaffen · Gestalten</text>
  <text x="642" y="346" class="mono" font-size="8" fill="#5A6A9A" letter-spacing="1">KOMPETENZFELDER</text>
  <text x="642" y="362" class="mono" font-size="9" fill="#8898C4" letter-spacing="0.5">K-05 Digital</text>
  <text x="642" y="378" class="mono" font-size="9" fill="#8898C4" letter-spacing="0.5">K-06 Führung</text>

  <!-- ── Baseline ── -->
  <line x1="40" y1="432" x2="820" y2="432" stroke="#15192B" stroke-width="1"/>

  <!-- Path line below panels connecting centers -->
  <line x1="170" y1="425" x2="460" y2="425" stroke="#C8CAD4" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="460" y1="425" x2="720" y2="425" stroke="#C8CAD4" stroke-width="1" stroke-dasharray="4,3"/>
  <circle cx="170" cy="425" r="3" fill="#EDEDF3" stroke="#15192B" stroke-width="1"/>
  <circle cx="460" cy="425" r="3" fill="#D9C089" stroke="#15192B" stroke-width="1"/>
  <circle cx="720" cy="425" r="3" fill="#1F2C56" stroke="#1F2C56" stroke-width="1"/>

  <!-- Labels below dots -->
  <text x="170" y="446" class="mono" font-size="9" fill="#7A8099" text-anchor="middle" letter-spacing="1">EINSTIEG</text>
  <text x="460" y="446" class="mono" font-size="9" fill="#7A8099" text-anchor="middle" letter-spacing="1">VERTIEFUNG</text>
  <text x="720" y="446" class="mono" font-size="9" fill="#7A8099" text-anchor="middle" letter-spacing="1">EXZELLENZ</text>

  <!-- Source -->
  <text x="40" y="485" class="mono" font-size="9" fill="#B0B3C0" letter-spacing="0.5">FKB Campus · Kompetenzmodell nach Dreyfus &amp; Dreyfus (1980) · Lernziele nach Anderson &amp; Krathwohl (2001)</text>
</svg>
