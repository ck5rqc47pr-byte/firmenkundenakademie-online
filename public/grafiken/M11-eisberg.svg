<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 600" width="860" height="600">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      text { font-family: Georgia, serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Source Serif 4', Georgia, serif; }
    </style>
  </defs>

  <rect width="860" height="600" fill="#F8F8FA"/>

  <text x="40" y="30" class="mono" font-size="10" fill="#7A8099" letter-spacing="2">EISBERG-MODELL · MODUL 11 · LATENTE BEDARFE ERKENNEN</text>
  <line x1="40" y1="40" x2="820" y2="40" stroke="#E2E3E8" stroke-width="1"/>

  <!-- water -->
  <rect x="60" y="235" width="420" height="300" fill="#EAEBF1"/>

  <!-- iceberg body (below waterline) -->
  <polygon points="205,235 395,235 442,305 420,405 338,475 248,483 168,402 158,312" fill="#1F2C56"/>
  <!-- iceberg tip (above waterline) -->
  <polygon points="300,150 235,235 365,235" fill="#3D5494"/>

  <!-- waterline -->
  <line x1="60" y1="235" x2="480" y2="235" stroke="#8898C4" stroke-width="1.5"/>
  <text x="66" y="228" class="mono" font-size="8" fill="#7A8099" letter-spacing="1">WASSERLINIE DES BEWUSSTSEINS</text>

  <!-- tip label -->
  <text x="300" y="120" class="mono" font-size="8" fill="#3D5494" letter-spacing="0.5" text-anchor="middle">EXPLIZITE BEDARFE</text>
  <text x="300" y="138" class="serif" font-size="12" font-style="italic" fill="#1F2C56" text-anchor="middle">vom Kunden klar benannt</text>

  <!-- body label -->
  <text x="300" y="320" class="mono" font-size="9" fill="#8898C4" letter-spacing="1" text-anchor="middle">LATENTE BEDARFE</text>
  <text x="300" y="346" class="serif" font-size="13" font-style="italic" fill="#F8F8FA" text-anchor="middle">nicht artikuliert,</text>
  <text x="300" y="366" class="serif" font-size="13" font-style="italic" fill="#F8F8FA" text-anchor="middle">oft unbewusst –</text>
  <text x="300" y="386" class="serif" font-size="13" font-style="italic" fill="#F8F8FA" text-anchor="middle">der Hebel der Beratung</text>

  <!-- ═══ Right: 4 reasons ═══ -->
  <text x="520" y="120" class="mono" font-size="9" fill="#7A8099" letter-spacing="1">WARUM BEDARFE UNAUSGESPROCHEN BLEIBEN</text>

  <rect x="520" y="138" width="300" height="82" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="520" y="138" width="4" height="82" fill="#1F2C56"/>
  <text x="542" y="172" class="serif" font-size="22" fill="#D9C089">1</text>
  <text x="576" y="166" class="serif" font-size="14" fill="#1F2C56" font-weight="500">Unbewusstheit</text>
  <text x="576" y="188" class="serif" font-size="11" fill="#3D4460">Der Bedarf ist dem Kunden</text>
  <text x="576" y="204" class="serif" font-size="11" fill="#3D4460">selbst nicht präsent.</text>

  <rect x="520" y="230" width="300" height="82" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="520" y="230" width="4" height="82" fill="#3D5494"/>
  <text x="542" y="264" class="serif" font-size="22" fill="#D9C089">2</text>
  <text x="576" y="258" class="serif" font-size="14" fill="#1F2C56" font-weight="500">Schambarriere</text>
  <text x="576" y="280" class="serif" font-size="11" fill="#3D4460">Probleme werden aus Scheu</text>
  <text x="576" y="296" class="serif" font-size="11" fill="#3D4460">nicht offen angesprochen.</text>

  <rect x="520" y="322" width="300" height="82" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="520" y="322" width="4" height="82" fill="#D9C089"/>
  <text x="542" y="356" class="serif" font-size="22" fill="#D9C089">3</text>
  <text x="576" y="350" class="serif" font-size="14" fill="#1F2C56" font-weight="500">Fehlende Sicherheit</text>
  <text x="576" y="372" class="serif" font-size="11" fill="#3D4460">Das Vertrauen zum Berater</text>
  <text x="576" y="388" class="serif" font-size="11" fill="#3D4460">reicht noch nicht aus.</text>

  <rect x="520" y="414" width="300" height="82" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="520" y="414" width="4" height="82" fill="#1F2C56"/>
  <text x="542" y="448" class="serif" font-size="22" fill="#D9C089">4</text>
  <text x="576" y="442" class="serif" font-size="14" fill="#1F2C56" font-weight="500">Gewohnheit</text>
  <text x="576" y="464" class="serif" font-size="11" fill="#3D4460">Suboptimale Lösungen</text>
  <text x="576" y="480" class="serif" font-size="11" fill="#3D4460">gelten als gegeben.</text>

  <text x="40" y="582" class="mono" font-size="9" fill="#B0B3C0" letter-spacing="0.5">Rackham (1988) · Schulz von Thun (1981) · Rogers &amp; Farson (1957) · latente Bedarfe im Beratungsgespräch</text>
</svg>
