<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 560" width="860" height="560">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      text { font-family: Georgia, serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Source Serif 4', Georgia, serif; }
    </style>
  </defs>

  <rect width="860" height="560" fill="#F8F8FA"/>

  <text x="40" y="30" class="mono" font-size="10" fill="#7A8099" letter-spacing="2">DREI ANALYSE-EBENEN · MODUL 22 · GESCHÄFTSMODELL UND STRATEGIE</text>
  <line x1="40" y1="40" x2="820" y2="40" stroke="#E2E3E8" stroke-width="1"/>

  <!-- rotated left label -->
  <text x="62" y="290" class="mono" font-size="9" fill="#B0B3C0" letter-spacing="1" transform="rotate(-90 62 290)" text-anchor="middle">VOM MARKT ZUM MANAGEMENT</text>

  <!-- Ebene 1: Markt & Branche -->
  <rect x="100" y="80" width="720" height="128" fill="#EDEDF3" stroke="#E2E3E8" stroke-width="1"/>
  <circle cx="146" cy="120" r="18" fill="#1F2C56"/>
  <text x="146" y="126" class="serif" font-size="18" fill="#D9C089" text-anchor="middle">1</text>
  <text x="182" y="116" class="serif" font-size="17" fill="#1F2C56" font-weight="500">Markt &amp; Branche</text>
  <text x="182" y="140" class="serif" font-size="13" font-style="italic" fill="#3D4460">„Wie attraktiv und stabil ist der Markt, in dem das Unternehmen agiert?"</text>
  <text x="182" y="182" class="mono" font-size="9" fill="#3D5494" letter-spacing="0.5">KREDITLESART · BRANCHENRISIKO, MARKTPHASE UND WETTBEWERBSINTENSITÄT</text>

  <!-- Ebene 2: Geschäftsmodell -->
  <rect x="100" y="220" width="720" height="128" fill="#3D5494"/>
  <circle cx="146" cy="260" r="18" fill="#FFFFFF"/>
  <text x="146" y="266" class="serif" font-size="18" fill="#1F2C56" text-anchor="middle">2</text>
  <text x="182" y="256" class="serif" font-size="17" fill="#FFFFFF" font-weight="500">Geschäftsmodell</text>
  <text x="182" y="280" class="serif" font-size="13" font-style="italic" fill="#E8EAF2">„Womit verdient das Unternehmen sein Geld – und wie tragfähig ist das?"</text>
  <text x="182" y="322" class="mono" font-size="9" fill="#D9C089" letter-spacing="0.5">KREDITLESART · ERTRAGSQUELLEN, KLUMPENRISIKO UND SKALIERBARKEIT</text>

  <!-- Ebene 3: Management & Nachfolge -->
  <rect x="100" y="360" width="720" height="128" fill="#1F2C56"/>
  <circle cx="146" cy="400" r="18" fill="#D9C089"/>
  <text x="146" y="406" class="serif" font-size="18" fill="#1F2C56" text-anchor="middle">3</text>
  <text x="182" y="396" class="serif" font-size="17" fill="#FFFFFF" font-weight="500">Management &amp; Nachfolge</text>
  <text x="182" y="420" class="serif" font-size="13" font-style="italic" fill="#C9D0E4">„Wer führt das Unternehmen – und ist die Zukunft personell gesichert?"</text>
  <text x="182" y="462" class="mono" font-size="9" fill="#D9C089" letter-spacing="0.5">KREDITLESART · FÜHRUNGSQUALITÄT, ABHÄNGIGKEITEN UND NACHFOLGEREGELUNG</text>

  <text x="40" y="544" class="mono" font-size="9" fill="#B0B3C0" letter-spacing="0.5">Osterwalder &amp; Pigneur (2010) · Porter (1980) · MaRisk AT 2.2 · integrierte Kreditanalyse</text>
</svg>
