<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 600" width="860" height="600">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      text { font-family: Georgia, serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Source Serif 4', Georgia, serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="860" height="600" fill="#F8F8FA"/>

  <!-- Eyebrow -->
  <text x="40" y="30" class="mono" font-size="10" fill="#7A8099" letter-spacing="2">SECI-MODELL · MODUL 19 · WISSENSMANAGEMENT IM BERATERTEAM</text>
  <line x1="40" y1="40" x2="820" y2="40" stroke="#E2E3E8" stroke-width="1"/>

  <!-- ══════════════════════════════════════════════
       2×2 QUADRANT  inner grid x: 200..420 | 440..660
       y: 90..300 | 320..530   each 220 wide / 210 high
       Axis labels on top (→ nach) and left (von ↓)
       ══════════════════════════════════════════════ -->

  <!-- Axis labels: columns = ZIEL (nach) -->
  <text x="310" y="72" class="mono" font-size="9" fill="#7A8099" letter-spacing="1" text-anchor="middle">ZIEL · IMPLIZITES WISSEN</text>
  <text x="550" y="72" class="mono" font-size="9" fill="#7A8099" letter-spacing="1" text-anchor="middle">ZIEL · EXPLIZITES WISSEN</text>

  <!-- Axis labels: rows = QUELLE (von), rotated -->
  <text x="180" y="195" class="mono" font-size="9" fill="#7A8099" letter-spacing="1" text-anchor="middle" transform="rotate(-90 180 195)">QUELLE · IMPLIZITES WISSEN</text>
  <text x="180" y="425" class="mono" font-size="9" fill="#7A8099" letter-spacing="1" text-anchor="middle" transform="rotate(-90 180 425)">QUELLE · EXPLIZITES WISSEN</text>

  <!-- ─── Q1: SOZIALISATION (implizit→implizit) accent ─── -->
  <rect x="200" y="90" width="220" height="210" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="200" y="90" width="4" height="210" fill="#D9C089"/>
  <text x="222" y="124" class="serif" font-size="30" font-style="italic" fill="#D9C089">S</text>
  <text x="222" y="150" class="serif" font-size="15" fill="#1F2C56" font-weight="500">Sozialisation</text>
  <text x="222" y="168" class="mono" font-size="8" fill="#7A8099" letter-spacing="0.5">IMPLIZIT <tspan font-family="Arial, sans-serif">→</tspan> IMPLIZIT</text>
  <line x1="222" y1="178" x2="400" y2="178" stroke="#E2E3E8" stroke-width="1"/>
  <text x="222" y="198" class="serif" font-size="11" fill="#3D4460">Erfahrung teilen durch</text>
  <text x="222" y="214" class="serif" font-size="11" fill="#3D4460">gemeinsames Tun.</text>
  <text x="222" y="244" class="mono" font-size="8" fill="#7A8099">PRAXIS</text>
  <text x="222" y="260" class="serif" font-size="11" fill="#1F2C56" font-style="italic">Tandem-Kundenbesuch:</text>
  <text x="222" y="276" class="serif" font-size="11" fill="#1F2C56" font-style="italic">Junior begleitet Senior</text>

  <!-- ─── Q2: EXTERNALISIERUNG (implizit→explizit) primary ─── -->
  <rect x="440" y="90" width="220" height="210" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="440" y="90" width="4" height="210" fill="#1F2C56"/>
  <text x="462" y="124" class="serif" font-size="30" font-style="italic" fill="#1F2C56">E</text>
  <text x="462" y="150" class="serif" font-size="15" fill="#1F2C56" font-weight="500">Externalisierung</text>
  <text x="462" y="168" class="mono" font-size="8" fill="#7A8099" letter-spacing="0.5">IMPLIZIT <tspan font-family="Arial, sans-serif">→</tspan> EXPLIZIT</text>
  <line x1="462" y1="178" x2="640" y2="178" stroke="#E2E3E8" stroke-width="1"/>
  <text x="462" y="198" class="serif" font-size="11" fill="#3D4460">Erfahrung in Worte</text>
  <text x="462" y="214" class="serif" font-size="11" fill="#3D4460">und Regeln fassen.</text>
  <text x="462" y="244" class="mono" font-size="8" fill="#7A8099">PRAXIS</text>
  <text x="462" y="260" class="serif" font-size="11" fill="#1F2C56" font-style="italic">Fallbesprechung:</text>
  <text x="462" y="276" class="serif" font-size="11" fill="#1F2C56" font-style="italic">Bauchgefühl benennen</text>

  <!-- ─── Q3: INTERNALISIERUNG (explizit→implizit) primary ─── -->
  <rect x="200" y="320" width="220" height="210" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="200" y="320" width="4" height="210" fill="#1F2C56"/>
  <text x="222" y="354" class="serif" font-size="30" font-style="italic" fill="#1F2C56">I</text>
  <text x="222" y="380" class="serif" font-size="15" fill="#1F2C56" font-weight="500">Internalisierung</text>
  <text x="222" y="398" class="mono" font-size="8" fill="#7A8099" letter-spacing="0.5">EXPLIZIT <tspan font-family="Arial, sans-serif">→</tspan> IMPLIZIT</text>
  <line x1="222" y1="408" x2="400" y2="408" stroke="#E2E3E8" stroke-width="1"/>
  <text x="222" y="428" class="serif" font-size="11" fill="#3D4460">Wissen durch Anwenden</text>
  <text x="222" y="444" class="serif" font-size="11" fill="#3D4460">zur Routine machen.</text>
  <text x="222" y="474" class="mono" font-size="8" fill="#7A8099">PRAXIS</text>
  <text x="222" y="490" class="serif" font-size="11" fill="#1F2C56" font-style="italic">Gelerntes im eigenen</text>
  <text x="222" y="506" class="serif" font-size="11" fill="#1F2C56" font-style="italic">Termin anwenden</text>

  <!-- ─── Q4: KOMBINATION (explizit→explizit) accent ─── -->
  <rect x="440" y="320" width="220" height="210" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="440" y="320" width="4" height="210" fill="#D9C089"/>
  <text x="462" y="354" class="serif" font-size="30" font-style="italic" fill="#D9C089">C</text>
  <text x="462" y="380" class="serif" font-size="15" fill="#1F2C56" font-weight="500">Kombination</text>
  <text x="462" y="398" class="mono" font-size="8" fill="#7A8099" letter-spacing="0.5">EXPLIZIT <tspan font-family="Arial, sans-serif">→</tspan> EXPLIZIT</text>
  <line x1="462" y1="408" x2="640" y2="408" stroke="#E2E3E8" stroke-width="1"/>
  <text x="462" y="428" class="serif" font-size="11" fill="#3D4460">Explizites Wissen neu</text>
  <text x="462" y="444" class="serif" font-size="11" fill="#3D4460">verknüpfen, ordnen.</text>
  <text x="462" y="474" class="mono" font-size="8" fill="#7A8099">PRAXIS</text>
  <text x="462" y="490" class="serif" font-size="11" fill="#1F2C56" font-style="italic">Branchenübersicht aus</text>
  <text x="462" y="506" class="serif" font-size="11" fill="#1F2C56" font-style="italic">mehreren Fällen bauen</text>

  <!-- Spiral arrows S→E→C→I (Wissensspirale) -->
  <!-- S→E -->
  <polygon points="424,195 436,189 436,201" fill="#C8CAD4"/>
  <!-- E→C (down) -->
  <polygon points="550,304 544,316 556,316" fill="#C8CAD4"/>
  <!-- C→I (left) -->
  <polygon points="436,425 424,419 424,431" fill="#C8CAD4"/>
  <!-- I→S (up) -->
  <polygon points="310,316 304,304 316,304" fill="#C8CAD4"/>

  <!-- Center label -->
  <text x="430" y="307" class="mono" font-size="8" fill="#B0B3C0" letter-spacing="1" text-anchor="middle">WISSENSSPIRALE</text>

  <!-- Source -->
  <text x="40" y="582" class="mono" font-size="9" fill="#B0B3C0" letter-spacing="0.5">Nonaka &amp; Takeuchi (1995) · Polanyi (1966) zu implizitem Wissen · Wissensspirale im Beraterteam</text>
</svg>
