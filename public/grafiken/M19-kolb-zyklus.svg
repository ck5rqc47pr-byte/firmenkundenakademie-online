<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 600" width="860" height="600">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      text { font-family: Georgia, serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Source Serif 4', Georgia, serif; }
    </style>
  </defs>

  <rect width="860" height="600" fill="#F8F8FA"/>

  <text x="40" y="30" class="mono" font-size="10" fill="#7A8099" letter-spacing="2">KOLB-LERNZYKLUS · MODUL 19 · WISSENSTRANSFER IM TEAM</text>
  <line x1="40" y1="40" x2="820" y2="40" stroke="#E2E3E8" stroke-width="1"/>

  <!-- rotation guide -->
  <circle cx="430" cy="320" r="150" fill="none" stroke="#E2E3E8" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- clockwise arrowheads on the circle -->
  <polygon points="452,172 438,165 438,179" fill="#C8CAD4"/>
  <polygon points="580,338 573,324 587,324" fill="#C8CAD4"/>
  <polygon points="408,470 422,463 422,477" fill="#C8CAD4"/>
  <polygon points="280,302 273,316 287,316" fill="#C8CAD4"/>

  <!-- center -->
  <circle cx="430" cy="320" r="58" fill="#1F2C56"/>
  <text x="430" y="312" class="mono" font-size="8" fill="#8898C4" letter-spacing="0.5" text-anchor="middle">LERNEN AUS</text>
  <text x="430" y="332" class="serif" font-size="14" fill="#F8F8FA" font-weight="500" text-anchor="middle">Erfahrung</text>

  <!-- TOP: Konkrete Erfahrung -->
  <rect x="320" y="84" width="220" height="92" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="320" y="84" width="220" height="4" fill="#1F2C56"/>
  <text x="336" y="110" class="mono" font-size="8" fill="#B0B3C0">1 · KONKRETE ERFAHRUNG</text>
  <text x="336" y="134" class="serif" font-size="14" fill="#1F2C56" font-weight="500">Erleben</text>
  <text x="336" y="158" class="serif" font-size="11" fill="#3D4460">Den Kundenfall in der Beratung erleben.</text>

  <!-- RIGHT: Reflektierte Beobachtung -->
  <rect x="600" y="274" width="220" height="92" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="600" y="274" width="220" height="4" fill="#3D5494"/>
  <text x="616" y="300" class="mono" font-size="8" fill="#B0B3C0">2 · REFLEXION</text>
  <text x="616" y="324" class="serif" font-size="14" fill="#1F2C56" font-weight="500">Beobachten</text>
  <text x="616" y="348" class="serif" font-size="11" fill="#3D4460">Im Team besprechen und auswerten.</text>

  <!-- BOTTOM: Abstrakte Begriffsbildung -->
  <rect x="320" y="464" width="220" height="92" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="320" y="464" width="220" height="4" fill="#D9C089"/>
  <text x="336" y="490" class="mono" font-size="8" fill="#B0B3C0">3 · BEGRIFFSBILDUNG</text>
  <text x="336" y="514" class="serif" font-size="14" fill="#1F2C56" font-weight="500">Verstehen</text>
  <text x="336" y="538" class="serif" font-size="11" fill="#3D4460">Muster &amp; Regeln ableiten.</text>

  <!-- LEFT: Aktives Experimentieren -->
  <rect x="40" y="274" width="220" height="92" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="40" y="274" width="220" height="4" fill="#3D5494"/>
  <text x="56" y="300" class="mono" font-size="8" fill="#B0B3C0">4 · EXPERIMENTIEREN</text>
  <text x="56" y="324" class="serif" font-size="14" fill="#1F2C56" font-weight="500">Anwenden</text>
  <text x="56" y="348" class="serif" font-size="11" fill="#3D4460">Im nächsten Fall neu erproben.</text>

  <text x="40" y="582" class="mono" font-size="9" fill="#B0B3C0" letter-spacing="0.5">Kolb (1984) Experiential Learning · vierphasiger Lernzyklus im Beraterteam</text>
</svg>
