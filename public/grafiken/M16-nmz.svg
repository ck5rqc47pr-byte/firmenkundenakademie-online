<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 540" width="860" height="540">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      text { font-family: Georgia, serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Source Serif 4', Georgia, serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="860" height="540" fill="#F8F8FA"/>

  <!-- Eyebrow -->
  <text x="40" y="30" class="mono" font-size="10" fill="#7A8099" letter-spacing="2">NETTOMARGENBEITRAG (NMZ) · MODUL 16 · ERTRAGSORIENTIERTE STEUERUNG</text>
  <line x1="40" y1="40" x2="820" y2="40" stroke="#E2E3E8" stroke-width="1"/>

  <!-- Formula box -->
  <rect x="40" y="60" width="780" height="74" fill="#1F2C56"/>
  <text x="430" y="95" class="serif" font-size="18" fill="#F8F8FA" text-anchor="middle">NMZ (%)  =  DB II  ×  100  /  Kreditvolumen</text>
  <text x="430" y="118" class="mono" font-size="8" fill="#8898C4" text-anchor="middle" letter-spacing="1">DECKUNGSBEITRAG II INS VERHÄLTNIS ZUM EINGESETZTEN KREDITVOLUMEN</text>

  <!-- Section heading -->
  <text x="40" y="168" class="mono" font-size="9" fill="#7A8099" letter-spacing="1">ERTRAGSHEBEL — BEITRAG ZUM NMZ</text>

  <!-- ROW 1: Zinsmarge -->
  <text x="40" y="200" class="serif" font-size="13" fill="#1F2C56" font-weight="500">Zinsmarge</text>
  <rect x="300" y="188" width="342" height="16" fill="#1F2C56"/>
  <text x="652" y="200" class="mono" font-size="8" fill="#7A8099">HAUPTHEBEL</text>

  <!-- ROW 2: Verbundertrag -->
  <text x="40" y="240" class="serif" font-size="13" fill="#1F2C56" font-weight="500">Verbundertrag</text>
  <rect x="300" y="228" width="247" height="16" fill="#3D5494"/>
  <text x="557" y="240" class="mono" font-size="8" fill="#7A8099">MITTEL–HOCH</text>

  <!-- ROW 3: Provisionsertrag -->
  <text x="40" y="280" class="serif" font-size="13" fill="#1F2C56" font-weight="500">Provisionsertrag</text>
  <rect x="300" y="268" width="190" height="16" fill="#D9C089"/>
  <text x="500" y="280" class="mono" font-size="8" fill="#7A8099">MITTEL</text>

  <!-- ROW 4: Risikokosten -->
  <text x="40" y="320" class="serif" font-size="13" fill="#1F2C56" font-weight="500">Risikokosten</text>
  <rect x="300" y="308" width="152" height="16" fill="#ef4444"/>
  <text x="462" y="320" class="mono" font-size="8" fill="#7A8099">MINDERND</text>

  <line x1="300" y1="335" x2="680" y2="335" stroke="#E2E3E8" stroke-width="1"/>
  <text x="300" y="350" class="mono" font-size="8" fill="#B0B3C0">geringerer Beitrag</text>
  <text x="680" y="350" class="mono" font-size="8" fill="#B0B3C0" text-anchor="end">höherer Beitrag</text>

  <!-- Benchmark scale -->
  <text x="40" y="396" class="mono" font-size="9" fill="#7A8099" letter-spacing="1">BENCHMARK NMZ</text>
  <rect x="40" y="408" width="240" height="40" fill="#ef4444"/>
  <rect x="280" y="408" width="240" height="40" fill="#f59e0b"/>
  <rect x="520" y="408" width="300" height="40" fill="#22c55e"/>
  <text x="160" y="426" class="mono" font-size="10" fill="#FFFFFF" text-anchor="middle">&lt; 1,0 %</text>
  <text x="160" y="440" class="mono" font-size="8" fill="#FFFFFF" text-anchor="middle">schwach</text>
  <text x="400" y="426" class="mono" font-size="10" fill="#15192B" text-anchor="middle">1,0 – 1,5 %</text>
  <text x="400" y="440" class="mono" font-size="8" fill="#15192B" text-anchor="middle">solide</text>
  <text x="670" y="426" class="mono" font-size="10" fill="#FFFFFF" text-anchor="middle">&gt; 1,5 %</text>
  <text x="670" y="440" class="mono" font-size="8" fill="#FFFFFF" text-anchor="middle">sehr guter Kundenwert</text>

  <!-- Source -->
  <text x="40" y="492" class="mono" font-size="9" fill="#B0B3C0" letter-spacing="0.5">zeb (2021) zu Kundenwertrechnung · NMZ als zentrale Steuerungsgröße im Firmenkundengeschäft</text>
</svg>
