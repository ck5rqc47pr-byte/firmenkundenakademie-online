<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 580" width="860" height="580">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      text { font-family: Georgia, serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Source Serif 4', Georgia, serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="860" height="580" fill="#F8F8FA"/>

  <!-- Eyebrow -->
  <text x="40" y="30" class="mono" font-size="10" fill="#7A8099" letter-spacing="2">VERBUNDPARTNER-MATRIX · MODUL 13 · GANZHEITLICHE FIRMENKUNDENBERATUNG</text>
  <line x1="40" y1="40" x2="820" y2="40" stroke="#E2E3E8" stroke-width="1"/>

  <!-- Column headers -->
  <text x="56"  y="66" class="mono" font-size="8" fill="#7A8099" letter-spacing="1">VERBUNDPARTNER</text>
  <text x="240" y="66" class="mono" font-size="8" fill="#7A8099" letter-spacing="1">KERNKOMPETENZ / LÖSUNGSFELD</text>
  <text x="580" y="66" class="mono" font-size="8" fill="#7A8099" letter-spacing="1">TYPISCHER BERATUNGSANLASS</text>
  <line x1="40" y1="74" x2="820" y2="74" stroke="#E2E3E8" stroke-width="1"/>

  <!-- Row 1: R+V -->
  <rect x="40" y="78" width="780" height="60" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="40" y="78" width="4" height="60" fill="#1F2C56"/>
  <text x="56" y="106" class="serif" font-size="14" fill="#1F2C56" font-weight="500">R+V</text>
  <text x="56" y="124" class="mono" font-size="8" fill="#7A8099">VERSICHERUNG</text>
  <text x="240" y="104" class="serif" font-size="11" fill="#3D4460">Betriebs- &amp; Personenabsicherung,</text>
  <text x="240" y="120" class="serif" font-size="11" fill="#3D4460">betriebliche Altersvorsorge (bAV)</text>
  <text x="580" y="113" class="serif" font-size="11" font-style="italic" fill="#1F2C56">Betriebsrisiken &amp; Schlüsselpersonen</text>

  <!-- Row 2: Union Investment -->
  <rect x="40" y="142" width="780" height="60" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="40" y="142" width="4" height="60" fill="#D9C089"/>
  <text x="56" y="170" class="serif" font-size="14" fill="#1F2C56" font-weight="500">Union Investment</text>
  <text x="56" y="188" class="mono" font-size="8" fill="#7A8099">KAPITALANLAGE</text>
  <text x="240" y="168" class="serif" font-size="11" fill="#3D4460">Anlage für Unternehmen &amp; privat,</text>
  <text x="240" y="184" class="serif" font-size="11" fill="#3D4460">fondsgebundene bAV</text>
  <text x="580" y="177" class="serif" font-size="11" font-style="italic" fill="#1F2C56">Liquidität anlegen, Vorsorge aufbauen</text>

  <!-- Row 3: Schwäbisch Hall -->
  <rect x="40" y="206" width="780" height="60" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="40" y="206" width="4" height="60" fill="#3D5494"/>
  <text x="56" y="234" class="serif" font-size="14" fill="#1F2C56" font-weight="500">Schwäbisch Hall</text>
  <text x="56" y="252" class="mono" font-size="8" fill="#7A8099">BAUSPAREN</text>
  <text x="240" y="241" class="serif" font-size="11" fill="#3D4460">Privates Bau- &amp; Wohneigentum</text>
  <text x="580" y="241" class="serif" font-size="11" font-style="italic" fill="#1F2C56">Unternehmer privat: Bauen / Wohnen</text>

  <!-- Row 4: MünchenerHyp -->
  <rect x="40" y="270" width="780" height="60" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="40" y="270" width="4" height="60" fill="#1F2C56"/>
  <text x="56" y="298" class="serif" font-size="14" fill="#1F2C56" font-weight="500">MünchenerHyp</text>
  <text x="56" y="316" class="mono" font-size="8" fill="#7A8099">IMMOBILIENFINANZIERUNG</text>
  <text x="240" y="305" class="serif" font-size="11" fill="#3D4460">Gewerbliche Immobilienfinanzierung &gt; 10 Jahre</text>
  <text x="580" y="305" class="serif" font-size="11" font-style="italic" fill="#1F2C56">Langfristige Gewerbeimmobilie</text>

  <!-- Row 5: DZ BANK -->
  <rect x="40" y="334" width="780" height="60" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="40" y="334" width="4" height="60" fill="#D9C089"/>
  <text x="56" y="362" class="serif" font-size="14" fill="#1F2C56" font-weight="500">DZ BANK</text>
  <text x="56" y="380" class="mono" font-size="8" fill="#7A8099">KAPITALMARKT</text>
  <text x="240" y="369" class="serif" font-size="11" fill="#3D4460">Kapitalmarkt &amp; Derivate (z. B. Zinsswap)</text>
  <text x="580" y="369" class="serif" font-size="11" font-style="italic" fill="#1F2C56">Zinsänderungsrisiko absichern</text>

  <!-- ═══ 4-SCHRITT-PROZESS ═══ -->
  <text x="40" y="436" class="mono" font-size="9" fill="#7A8099" letter-spacing="1">SO KOMMT DER VERBUNDIMPULS INS GESPRÄCH</text>

  <!-- Steps x=40,238,436,634 w=178 -->
  <rect x="40"  y="448" width="178" height="68" fill="#EDEDF3" stroke="#15192B" stroke-width="1"/>
  <text x="58" y="478" class="serif" font-size="13" fill="#15192B" font-weight="500">1 · Analyse</text>
  <text x="58" y="498" class="mono" font-size="8" fill="#7A8099">Bilanz &amp; Lebenslage</text>
  <text x="58" y="510" class="mono" font-size="8" fill="#7A8099">auf Bedarfe lesen</text>

  <rect x="238" y="448" width="178" height="68" fill="#FFFFFF" stroke="#15192B" stroke-width="1"/>
  <text x="256" y="478" class="serif" font-size="13" fill="#15192B" font-weight="500">2 · Hypothese</text>
  <text x="256" y="498" class="mono" font-size="8" fill="#7A8099">Passenden Partner</text>
  <text x="256" y="510" class="mono" font-size="8" fill="#7A8099">+ Lösung zuordnen</text>

  <rect x="436" y="448" width="178" height="68" fill="#FFFFFF" stroke="#15192B" stroke-width="1"/>
  <text x="454" y="478" class="serif" font-size="13" fill="#15192B" font-weight="500">3 · Gespräch</text>
  <text x="454" y="498" class="mono" font-size="8" fill="#7A8099">Bedarf offen ansprechen,</text>
  <text x="454" y="510" class="mono" font-size="8" fill="#7A8099">Impuls platzieren</text>

  <rect x="634" y="448" width="186" height="68" fill="#1F2C56" stroke="#1F2C56" stroke-width="1"/>
  <text x="652" y="478" class="serif" font-size="13" fill="#F8F8FA" font-weight="500">4 · Dokumentation</text>
  <text x="652" y="498" class="mono" font-size="8" fill="#8898C4">Weiterleitung &amp; Nach-</text>
  <text x="652" y="510" class="mono" font-size="8" fill="#8898C4">verfolgung sichern</text>

  <!-- Arrows between steps -->
  <polygon points="220,482 230,488 220,494" fill="#C8CAD4"/>
  <polygon points="418,482 428,488 418,494" fill="#C8CAD4"/>
  <polygon points="616,482 626,488 616,494" fill="#C8CAD4"/>

  <!-- Source -->
  <text x="40" y="556" class="mono" font-size="9" fill="#B0B3C0" letter-spacing="0.5">BVR-Verbundkonzept · genossenschaftliche FinanzGruppe · ganzheitlicher Beratungsansatz</text>
</svg>
