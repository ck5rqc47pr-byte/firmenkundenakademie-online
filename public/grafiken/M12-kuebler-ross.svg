<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 560" width="860" height="560">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      text { font-family: Georgia, serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Source Serif 4', Georgia, serif; }
    </style>
  </defs>

  <rect width="860" height="560" fill="#F8F8FA"/>

  <text x="40" y="30" class="mono" font-size="10" fill="#7A8099" letter-spacing="2">VERÄNDERUNGSKURVE · MODUL 12 · CEO-DIALOG UND NACHFOLGE</text>
  <line x1="40" y1="40" x2="820" y2="40" stroke="#E2E3E8" stroke-width="1"/>

  <!-- axes -->
  <line x1="90" y1="100" x2="90" y2="400" stroke="#C8CAD4" stroke-width="1"/>
  <line x1="90" y1="400" x2="810" y2="400" stroke="#C8CAD4" stroke-width="1"/>
  <text x="80" y="250" class="mono" font-size="9" fill="#B0B3C0" letter-spacing="1" transform="rotate(-90 80 250)" text-anchor="middle">EMOTIONALE ZUSTIMMUNG</text>
  <text x="810" y="420" class="mono" font-size="9" fill="#B0B3C0" letter-spacing="0.5" text-anchor="end">ZEIT IM NACHFOLGEPROZESS</text>

  <!-- curve -->
  <path d="M100,175 C180,210 230,330 320,365 C375,388 400,388 430,388 C470,388 530,355 600,300 C670,250 710,205 760,175" fill="none" stroke="#1F2C56" stroke-width="2.5"/>

  <!-- phase dots -->
  <circle cx="100" cy="175" r="7" fill="#1F2C56"/>
  <text x="100" y="158" class="mono" font-size="8" fill="#3D4460" text-anchor="middle">1 SCHOCK</text>
  <circle cx="250" cy="335" r="7" fill="#3D5494"/>
  <text x="250" y="362" class="mono" font-size="8" fill="#3D4460" text-anchor="middle">2 WIDERSTAND</text>
  <circle cx="430" cy="388" r="7" fill="#D9C089"/>
  <text x="430" y="368" class="mono" font-size="8" fill="#3D4460" text-anchor="middle">3 TAL DER UNSICHERHEIT</text>
  <circle cx="610" cy="298" r="7" fill="#3D5494"/>
  <text x="610" y="280" class="mono" font-size="8" fill="#3D4460" text-anchor="middle">4 AKZEPTANZ</text>
  <circle cx="760" cy="175" r="7" fill="#1F2C56"/>
  <text x="760" y="158" class="mono" font-size="8" fill="#3D4460" text-anchor="middle">5 INTEGRATION</text>

  <!-- Beraterrolle strip -->
  <text x="40" y="438" class="mono" font-size="9" fill="#7A8099" letter-spacing="1">DIE ROLLE DES BERATERS JE PHASE</text>

  <rect x="40" y="450" width="148" height="64" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="40" y="450" width="148" height="4" fill="#1F2C56"/>
  <text x="56" y="478" class="serif" font-size="13" fill="#1F2C56" font-weight="500">Verständnis</text>
  <text x="56" y="500" class="serif" font-size="11" fill="#3D4460">zeigen, da sein.</text>

  <rect x="196" y="450" width="148" height="64" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="196" y="450" width="148" height="4" fill="#3D5494"/>
  <text x="212" y="478" class="serif" font-size="13" fill="#1F2C56" font-weight="500">Geduld</text>
  <text x="212" y="500" class="serif" font-size="11" fill="#3D4460">&amp; Zuhören.</text>

  <rect x="352" y="450" width="148" height="64" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="352" y="450" width="148" height="4" fill="#D9C089"/>
  <text x="368" y="478" class="serif" font-size="13" fill="#1F2C56" font-weight="500">Sicherheit</text>
  <text x="368" y="500" class="serif" font-size="11" fill="#3D4460">geben.</text>

  <rect x="508" y="450" width="148" height="64" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="508" y="450" width="148" height="4" fill="#3D5494"/>
  <text x="524" y="478" class="serif" font-size="13" fill="#1F2C56" font-weight="500">Optionen</text>
  <text x="524" y="500" class="serif" font-size="11" fill="#3D4460">aufzeigen.</text>

  <rect x="664" y="450" width="148" height="64" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="664" y="450" width="148" height="4" fill="#1F2C56"/>
  <text x="680" y="478" class="serif" font-size="13" fill="#1F2C56" font-weight="500">Umsetzung</text>
  <text x="680" y="500" class="serif" font-size="11" fill="#3D4460">begleiten.</text>

  <text x="40" y="544" class="mono" font-size="9" fill="#B0B3C0" letter-spacing="0.5">Kübler-Ross (1969) · adaptierte Veränderungskurve · emotionale Phasen im Nachfolgeprozess</text>
</svg>
