<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 560" width="860" height="560">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      text { font-family: Georgia, serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Source Serif 4', Georgia, serif; }
    </style>
  </defs>

  <rect width="860" height="560" fill="#F8F8FA"/>

  <text x="40" y="30" class="mono" font-size="10" fill="#7A8099" letter-spacing="2">PRAXISWERT-ERMITTLUNG (IDW S5) · MODUL 07 · BRANCHENVERTIEFUNG HEILBERUFE</text>
  <line x1="40" y1="40" x2="820" y2="40" stroke="#E2E3E8" stroke-width="1"/>

  <text x="40" y="68" class="mono" font-size="9" fill="#7A8099" letter-spacing="1">ERTRAGSWERTVERFAHREN · ZAHNARZTPRAXIS (BEISPIEL) · ALLE WERTE IN €</text>

  <!-- baseline -->
  <line x1="90" y1="400" x2="710" y2="400" stroke="#C8CAD4" stroke-width="1"/>

  <!-- ═══ Bars ═══ -->
  <!-- Bar 1: Ø Jahresüberschuss 303.333 (primary, full) -->
  <rect x="90" y="121" width="90" height="279" fill="#1F2C56"/>
  <text x="135" y="113" class="mono" font-size="11" fill="#1F2C56" text-anchor="middle">303.333</text>

  <!-- Bar 2: ./. Unternehmerlohn -130.000 (red, floating) -->
  <rect x="215" y="121" width="90" height="120" fill="#ef4444"/>
  <text x="260" y="113" class="mono" font-size="11" fill="#ef4444" text-anchor="middle">− 130.000</text>

  <!-- Bar 3: = Ertrag vor Risiko 173.333 (mid, full) -->
  <rect x="340" y="241" width="90" height="159" fill="#3D5494"/>
  <text x="385" y="233" class="mono" font-size="11" fill="#3D5494" text-anchor="middle">173.333</text>

  <!-- Bar 4: ./. Risikoabschlag -43.333 (red, floating) -->
  <rect x="465" y="241" width="90" height="40" fill="#ef4444"/>
  <text x="510" y="233" class="mono" font-size="11" fill="#ef4444" text-anchor="middle">− 43.333</text>

  <!-- Bar 5: = nachhaltiger Jahresertrag 130.000 (primary + gold top) -->
  <rect x="590" y="280" width="90" height="120" fill="#1F2C56"/>
  <rect x="590" y="280" width="90" height="4" fill="#D9C089"/>
  <text x="635" y="272" class="mono" font-size="11" fill="#1F2C56" font-weight="500" text-anchor="middle">130.000</text>

  <!-- dashed connectors -->
  <line x1="180" y1="121" x2="215" y2="121" stroke="#B0B3C0" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="305" y1="241" x2="340" y2="241" stroke="#B0B3C0" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="430" y1="241" x2="465" y2="241" stroke="#B0B3C0" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="555" y1="281" x2="590" y2="281" stroke="#B0B3C0" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- category labels -->
  <text x="135" y="418" class="mono" font-size="8" fill="#3D4460" text-anchor="middle">Ø JAHRESÜBERSCHUSS</text>
  <text x="135" y="430" class="mono" font-size="8" fill="#7A8099" text-anchor="middle">3-JAHRES-MITTEL</text>
  <text x="260" y="418" class="mono" font-size="8" fill="#3D4460" text-anchor="middle">./. KALKULAT.</text>
  <text x="260" y="430" class="mono" font-size="8" fill="#7A8099" text-anchor="middle">UNTERNEHMERLOHN</text>
  <text x="385" y="418" class="mono" font-size="8" fill="#3D4460" text-anchor="middle">= ERTRAG</text>
  <text x="385" y="430" class="mono" font-size="8" fill="#7A8099" text-anchor="middle">VOR RISIKO</text>
  <text x="510" y="418" class="mono" font-size="8" fill="#3D4460" text-anchor="middle">./. RISIKO-</text>
  <text x="510" y="430" class="mono" font-size="8" fill="#7A8099" text-anchor="middle">ABSCHLAG 25 %</text>
  <text x="635" y="418" class="mono" font-size="8" fill="#1F2C56" text-anchor="middle">= NACHHALTIGER</text>
  <text x="635" y="430" class="mono" font-size="8" fill="#7A8099" text-anchor="middle">JAHRESERTRAG</text>

  <!-- ═══ Result band ═══ -->
  <rect x="90" y="458" width="620" height="58" fill="#1F2C56"/>
  <text x="400" y="484" class="serif" font-size="14" fill="#F8F8FA" text-anchor="middle">nachhaltiger Jahresertrag 130.000 €  ×  Kapitalisierungsfaktor 3,0</text>
  <text x="400" y="506" class="serif" font-size="15" fill="#D9C089" font-weight="500" text-anchor="middle">= Ertragswert / Goodwill der Praxis  =  390.000 €</text>

  <text x="40" y="544" class="mono" font-size="9" fill="#B0B3C0" letter-spacing="0.5">IDW S5 zur Bewertung immaterieller Vermögenswerte · § 18 EStG · Ertragswertverfahren für Heilberufspraxen</text>
</svg>
