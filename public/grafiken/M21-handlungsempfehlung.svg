  <text x="460" y="360" class="serif" font-size="13" fill="#3D4460">Gegenargumente aktiv suchen</text>
  <text x="460" y="380" class="serif" font-size="13" fill="#3D4460">(Pre-Mortem durchführen).</text>

  <!-- Row 4 -->
  <rect x="40" y="406" width="780" height="92" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="40" y="406" width="6" height="92" fill="#f59e0b"/>
  <text x="70" y="436" class="mono" font-size="8" fill="#f59e0b">WENN</text>
  <text x="70" y="462" class="serif" font-size="14" fill="#1F2C56">Entscheidung unter Zeitdruck</text>
  <polygon points="424,448 424,464 442,456" fill="#D9C089"/>
  <line x1="430" y1="422" x2="430" y2="482" stroke="#F1F1F4" stroke-width="1"/>
  <text x="460" y="436" class="mono" font-size="8" fill="#9A7B2E">DANN</text>
  <text x="460" y="460" class="serif" font-size="13" fill="#3D4460">System 2 aktivieren,</text>
  <text x="460" y="480" class="serif" font-size="13" fill="#3D4460">Entscheidung bewusst vertagen.</text>

  <text x="40" y="538" class="mono" font-size="9" fill="#B0B3C0" letter-spacing="0.5">Handlungsempfehlung · Diagnose zu Aktion · Kahneman (2011) Debiasing in der Kreditentscheidung</text>
</svg>
