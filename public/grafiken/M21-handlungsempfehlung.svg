<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 560" width="860" height="560">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      text { font-family: Georgia, serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Source Serif 4', Georgia, serif; }
    </style>
  </defs>

  <rect width="860" height="560" fill="#F8F8FA"/>

  <text x="40" y="30" class="mono" font-size="10" fill="#7A8099" letter-spacing="2">HANDLUNGSEMPFEHLUNG · MODUL 21 · KREDITENTSCHEIDUNG TREFFEN</text>
  <line x1="40" y1="40" x2="820" y2="40" stroke="#E2E3E8" stroke-width="1"/>

  <text x="40" y="66" class="mono" font-size="9" fill="#7A8099" letter-spacing="1">VON DER VERZERRUNG ZUR GEGENMASSNAHME · WENN-DANN-LOGIK</text>

  <text x="76" y="96" class="mono" font-size="9" fill="#B0B3C0" letter-spacing="1">WENN · KOGNITIVE VERZERRUNG</text>
  <text x="460" y="96" class="mono" font-size="9" fill="#B0B3C0" letter-spacing="1">DANN · DEBIASING-MASSNAHME</text>

  <!-- Row 1 -->
  <rect x="40" y="106" width="780" height="92" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="40" y="106" width="6" height="92" fill="#f59e0b"/>
  <text x="70" y="136" class="mono" font-size="8" fill="#f59e0b">WENN</text>
  <text x="70" y="162" class="serif" font-size="14" fill="#1F2C56">Starker Sympathie- / Halo-Effekt</text>
  <polygon points="424,148 424,164 442,156" fill="#D9C089"/>
  <line x1="430" y1="122" x2="430" y2="182" stroke="#F1F1F4" stroke-width="1"/>
  <text x="460" y="136" class="mono" font-size="8" fill="#9A7B2E">DANN</text>
  <text x="460" y="160" class="serif" font-size="13" fill="#3D4460">Strukturierte Checkliste und</text>
  <text x="460" y="180" class="serif" font-size="13" fill="#3D4460">Vier-Augen-Prinzip anwenden.</text>

  <!-- Row 2 -->
  <rect x="40" y="206" width="780" height="92" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="40" y="206" width="6" height="92" fill="#f59e0b"/>
  <text x="70" y="236" class="mono" font-size="8" fill="#f59e0b">WENN</text>
  <text x="70" y="262" class="serif" font-size="14" fill="#1F2C56">Erste Zahl wirkt als Anker</text>
  <polygon points="424,248 424,264 442,256" fill="#D9C089"/>
  <line x1="430" y1="222" x2="430" y2="282" stroke="#F1F1F4" stroke-width="1"/>
  <text x="460" y="236" class="mono" font-size="8" fill="#9A7B2E">DANN</text>
  <text x="460" y="260" class="serif" font-size="13" fill="#3D4460">Unabhängige Zweitbewertung</text>
  <text x="460" y="280" class="serif" font-size="13" fill="#3D4460">einholen.</text>

  <!-- Row 3 -->
  <rect x="40" y="306" width="780" height="92" fill="#FFFFFF" stroke="#E2E3E8" stroke-width="1"/>
  <rect x="40" y="306" width="6" height="92" fill="#ef4444"/>
  <text x="70" y="336" class="mono" font-size="8" fill="#ef4444">WENN</text>
  <text x="70" y="362" class="serif" font-size="14" fill="#1F2C56">Nur bestätigende Infos gesucht</text>
  <polygon points="424,348 424,364 442,356" fill="#D9C089"/>
  <line x1="430" y1="322" x2="430" y2="382" stroke="#F1F1F4" stroke-width="1"/>
