<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 480" width="860" height="480">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      text { font-family: Georgia, serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Source Serif 4', Georgia, serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="860" height="480" fill="#F8F8FA"/>

  <!-- Eyebrow -->
  <text x="40" y="30" class="mono" font-size="10" fill="#7A8099" letter-spacing="2">ANALYSEPROZESS · MODUL 01 · NACH SCHIERENBECK ET AL. (2014)</text>
  <line x1="40" y1="40" x2="820" y2="40" stroke="#E2E3E8" stroke-width="1"/>

  <!-- ══════════════════════════════════════════════
       4 STEPS: x=40,230,420,610  w=170  y=80–360
       ══════════════════════════════════════════════ -->

  <!-- ─── STEP 1: Bereinigung — bg-2 #EDEDF3 ─── -->
  <rect x="40" y="80" width="170" height="280" fill="#EDEDF3"/>
  <rect x="40" y="80" width="170" height="280" fill="none" stroke="#15192B" stroke-width="1"/>
  <!-- Roman numeral -->
  <text x="55" y="140" class="serif" font-size="48" font-style="italic" fill="#1F2C56">I.</text>
  <!-- Step name -->
  <text x="55" y="165" class="serif" font-size="15" fill="#15192B" font-weight="500">Bereinigung</text>
  <!-- Step label -->
  <text x="55" y="182" class="mono" font-size="9" fill="#7A8099" letter-spacing="1">SCHRITT 1</text>
  <!-- Separator -->
  <line x1="55" y1="192" x2="195" y2="192" stroke="#15192B" stroke-width="0.5" opacity="0.2"/>
  <!-- Items -->
  <text x="55" y="208" class="mono" font-size="9" fill="#7A8099" letter-spacing="0.5">Positionen normieren</text>
  <text x="55" y="224" class="mono" font-size="9" fill="#7A8099" letter-spacing="0.5">Einmaleffekte eliminieren</text>
  <text x="55" y="240" class="mono" font-size="9" fill="#7A8099" letter-spacing="0.5">Vergleichbarkeit herstellen</text>

  <!-- Arrow 1→2 -->
  <polygon points="214,216 228,220 214,224" fill="#C8CAD4"/>

  <!-- ─── STEP 2: Kennzahlen — accent #D9C089 ─── -->
  <rect x="230" y="80" width="170" height="280" fill="#D9C089"/>
  <rect x="230" y="80" width="170" height="280" fill="none" stroke="#15192B" stroke-width="1"/>
  <text x="245" y="140" class="serif" font-size="48" font-style="italic" fill="#15192B">II.</text>
  <text x="245" y="165" class="serif" font-size="15" fill="#15192B" font-weight="500">Kennzahlen-Berechnung</text>
  <text x="245" y="182" class="mono" font-size="9" fill="#3D4460" letter-spacing="1">SCHRITT 2</text>
  <line x1="245" y1="192" x2="385" y2="192" stroke="#15192B" stroke-width="0.5" opacity="0.2"/>
  <text x="245" y="208" class="mono" font-size="9" fill="#3D4460" letter-spacing="0.5">EK-Quote berechnen</text>
  <text x="245" y="224" class="mono" font-size="9" fill="#3D4460" letter-spacing="0.5">KDCG ermitteln</text>
  <text x="245" y="240" class="mono" font-size="9" fill="#3D4460" letter-spacing="0.5">Alle 6 Kennzahlen</text>

  <!-- Arrow 2→3 -->
  <polygon points="404,216 418,220 404,224" fill="#C8CAD4"/>

  <!-- ─── STEP 3: Trendanalyse — mid-primary #3D5494 ─── -->
  <rect x="420" y="80" width="170" height="280" fill="#3D5494"/>
  <rect x="420" y="80" width="170" height="280" fill="none" stroke="#15192B" stroke-width="1"/>
  <text x="435" y="140" class="serif" font-size="48" font-style="italic" fill="#F8F8FA">III.</text>
  <text x="435" y="165" class="serif" font-size="15" fill="#F8F8FA" font-weight="500">Trendanalyse</text>
  <text x="435" y="182" class="mono" font-size="9" fill="#8898C4" letter-spacing="1">SCHRITT 3</text>
  <line x1="435" y1="192" x2="575" y2="192" stroke="#F8F8FA" stroke-width="0.5" opacity="0.25"/>
  <text x="435" y="208" class="mono" font-size="9" fill="#8898C4" letter-spacing="0.5">3-Jahres-Vergleich</text>
  <text x="435" y="224" class="mono" font-size="9" fill="#8898C4" letter-spacing="0.5">Veränderungsraten</text>
  <text x="435" y="240" class="mono" font-size="9" fill="#8898C4" letter-spacing="0.5">Entwicklungsrichtung</text>

  <!-- Arrow 3→4 -->
  <polygon points="594,216 608,220 594,224" fill="#C8CAD4"/>

  <!-- ─── STEP 4: Branchenvergleich — primary #1F2C56 ─── -->
  <rect x="610" y="80" width="210" height="280" fill="#1F2C56"/>
  <rect x="610" y="80" width="210" height="280" fill="none" stroke="#1F2C56" stroke-width="1"/>
  <text x="625" y="140" class="serif" font-size="48" font-style="italic" fill="#D9C089">IV.</text>
  <text x="625" y="165" class="serif" font-size="15" fill="#F8F8FA" font-weight="500">Branchen-Vergleich</text>
  <text x="625" y="182" class="mono" font-size="9" fill="#8898C4" letter-spacing="1">SCHRITT 4</text>
  <line x1="625" y1="192" x2="800" y2="192" stroke="#F8F8FA" stroke-width="0.5" opacity="0.25"/>
  <text x="625" y="208" class="mono" font-size="9" fill="#8898C4" letter-spacing="0.5">KfW-Benchmarks</text>
  <text x="625" y="224" class="mono" font-size="9" fill="#8898C4" letter-spacing="0.5">Creditreform-Daten</text>
  <text x="625" y="240" class="mono" font-size="9" fill="#8898C4" letter-spacing="0.5">Einordnung ins Portfolio</text>

  <!-- ── Baseline y=360 ── -->
  <line x1="40" y1="360" x2="820" y2="360" stroke="#15192B" stroke-width="1"/>

  <!-- Direction label below baseline -->
  <text x="40" y="378" class="mono" font-size="9" fill="#7A8099" letter-spacing="1">ANALYSEDAUER CA. 30–45 MIN. · § 18 KWG-PFLICHT</text>
  <!-- Arrow -->
  <line x1="380" y1="374" x2="560" y2="374" stroke="#E2E3E8" stroke-width="1"/>
  <polygon points="560,370 570,374 560,378" fill="#E2E3E8"/>

  <!-- Source -->
  <text x="40" y="465" class="mono" font-size="9" fill="#B0B3C0" letter-spacing="0.5">Schierenbeck, Lister &amp; Kirmsse (2014). Ertragsorientiertes Bankmanagement (9. Aufl.). Springer Gabler.</text>
</svg>
